# Serves the SPA. /api and /ws are routed by the Kubernetes ingress directly
# to the API server and the WebSocket proxy; this nginx only serves static
# files and the SPA fallback.
server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /healthz {
        return 200 'ok';
    }

    location / {
        try_files $uri /index.html;
    }

    location ~* \.(js|css|png|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
