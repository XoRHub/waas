# Serves the SPA. /api and /ws are routed by the Kubernetes ingress directly
# to the API server and the WebSocket proxy; this nginx only serves static
# files and the SPA fallback.
#
# CSP notes — every directive is derived from what the app actually does:
#   script/style-src 'self'  bundled Vite assets; no runtime <style> or
#                            <script> injection (YamlEditor is a textarea,
#                            React styles go through the CSSOM, which CSP
#                            does not govern).
#   img-src https: data: blob:  catalog icons may be any https URL by
#                            design (src/lib/icon.ts, jsdelivr CDN default);
#                            guacamole-common-js renders session images
#                            from data:/blob: URIs.
#   connect-src              same-origin API + SSE (/api/v1/events), plus
#                            the guacd tunnel websocket (/ws) spelled out
#                            explicitly: not every browser matches ws(s)
#                            against 'self'. $http_host keeps the port.
#   frame-ancestors 'none' + X-Frame-Options DENY  the portal is never
#                            embedded; the JWT lives in localStorage, so
#                            clickjacking surface must stay closed.
server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' https: data: blob:; font-src 'self'; connect-src 'self' ws://$http_host wss://$http_host; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /healthz {
        return 200 'ok';
    }

    location / {
        try_files $uri /index.html;
    }

    location ~* \.(js|css|png|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        # add_header is NOT inherited once a location sets its own (the
        # Cache-Control above) — repeat the security set or assets ship bare.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' https: data: blob:; font-src 'self'; connect-src 'self' ws://$http_host wss://$http_host; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }
}
