# WaaS monorepo pipeline — GitHub is the sole and canonical forge (the
# GitLab pipeline has been retired).
# Full picture in docs/ci-github.md.
#
#   PR:    selective per-component gates (dorny/paths-filter drives the
#          change scopes) — lint + tests + security
#          + image builds (NOT pushed, amd64 scanned locally)
#   main:  same gates, ALL images built and pushed as <short-sha>
#          (+ moving `edge` tag) — a release PROMOTES the images of the
#          released SHA, so every main commit must carry the full set
#   release: release-please (manifest mode) runs at the END of the main
#          pipeline; when its release PR merges it tags vX.Y.Z and the
#          promote job re-tags the already-built-and-scanned <short-sha>
#          manifest lists — never a rebuild — then cosign-signs the
#          digests (keyless OIDC), adds a moving `latest` tag (the newest
#          official release only — never confused with the `edge` dev
#          pointer above) and appends the digest table to the GitHub
#          Release. Chaining promotion in the SAME workflow run (gated on
#          the release_created output) sidesteps the GITHUB_TOKEN
#          anti-recursion rule — no PAT/App needed — and guarantees the
#          <short-sha> images exist before promotion.
#
# This file is the orchestrator: path filtering (`changes`) plus the
# jobs that must stay HERE — chart-oci (must not gate release-please;
# a workflow_call job only succeeds if every job inside it does),
# release-please, promote and promote-chart (release-please -> promote
# chaining needs the SAME run; promote's cosign signature also records
# THIS file's path via the OIDC job_workflow_ref claim — moving it
# would break the --certificate-identity-regexp in docs/ci-github.md).
# Everything else is delegated to reusable workflows (`workflow_call`)
# so each domain is reviewable on its own: ci-go.yml, ci-frontend.yml,
# ci-helm.yml, ci-security.yml, ci-images.yml.
#
# Multi-arch: one native amd64 leg (ubuntu-latest) + one arm64 leg whose
# runner is picked by the WAAS_BUILD_STRATEGY repository variable:
#   native → ubuntu-24.04-arm (free on public repos)
#   anything else / unset → ubuntu-latest under QEMU (safe default)
# A merge job assembles the manifest list.
#
# Actions are pinned by commit SHA (Renovate: helpers:pinGitHubActionDigests).

name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  # Cancel superseded PR runs; never cancel main (promotion source).
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REGISTRY: ghcr.io

jobs:
  # ------------------------------------------------------------------
  # Path filtering. PR pipelines are selective; push pipelines on main
  # force EVERYTHING (build-all invariant: release promotion needs the
  # complete image set at any taggable SHA).
  # ------------------------------------------------------------------
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      go_lint: ${{ steps.plan.outputs.go_lint }}
      go_test: ${{ steps.plan.outputs.go_test }}
      images: ${{ steps.plan.outputs.images }}
      frontend: ${{ steps.plan.outputs.frontend }}
      helm: ${{ steps.plan.outputs.helm }}
      drift: ${{ steps.plan.outputs.drift }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Change scopes follow the REAL dependency graph (go.mod replace
      # directives):
      #   api-server -> operator + shared, wwt -> shared,
      #   test/smoke -> operator, operator self-contained.
      # &ci is the global-rebuild trap: shared CI config changes retrigger
      # every scope. Keep it FIRST in every list.
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        if: github.event_name == 'pull_request'
        with:
          filters: |
            ci: &ci
              - '.github/workflows/**'
            go-global: &go-global
              - *ci
              - 'go.work'
              - 'go.work.sum'
              - '.golangci.yml'
            shared:
              - *go-global
              - 'shared/**'
            operator:
              - *go-global
              - 'operator/**'
            api-server:
              - *go-global
              - 'api-server/**'
            wwt:
              - *go-global
              - 'wwt/**'
            smoke:
              - *go-global
              - 'test/smoke/**'
            # Editor CRD schemas: a hand edit must face the same drift
            # gate a CRD change does (see the DRIFT composition below).
            crd-schemas:
              - *ci
              - 'crd-schemas/**'
            frontend:
              - *ci
              - 'frontend/**'
            helm:
              - *ci
              - 'helm/**'
              - 'gitops/**'
              - 'hack/dev/*.yaml'
              - 'hack/ci/**'
              - 'operator/api/**'
              - 'operator/config/**'
            image-operator:
              - *ci
              - 'operator/**'
            # api-server's Dockerfile copies shared/ + operator/{api,pkg}.
            image-api-server:
              - *ci
              - 'api-server/**'
              - 'shared/**'
              - 'operator/api/**'
              - 'operator/pkg/**'
              - 'operator/go.mod'
              - 'operator/go.sum'
            # wwt's Dockerfile copies shared/.
            image-wwt:
              - *ci
              - 'wwt/**'
              - 'shared/**'
            image-frontend:
              - *ci
              - 'frontend/**'
      - name: Compose job matrices
        id: plan
        env:
          EVENT: ${{ github.event_name }}
          F_SHARED: ${{ steps.filter.outputs.shared }}
          F_OPERATOR: ${{ steps.filter.outputs.operator }}
          F_API: ${{ steps.filter.outputs.api-server }}
          F_WWT: ${{ steps.filter.outputs.wwt }}
          F_SMOKE: ${{ steps.filter.outputs.smoke }}
          F_CRDSCHEMAS: ${{ steps.filter.outputs.crd-schemas }}
          F_FRONTEND: ${{ steps.filter.outputs.frontend }}
          F_HELM: ${{ steps.filter.outputs.helm }}
          F_IMG_OPERATOR: ${{ steps.filter.outputs.image-operator }}
          F_IMG_API: ${{ steps.filter.outputs.image-api-server }}
          F_IMG_WWT: ${{ steps.filter.outputs.image-wwt }}
          F_IMG_FRONTEND: ${{ steps.filter.outputs.image-frontend }}
        run: |
          set -euo pipefail
          if [ "$EVENT" = "push" ]; then
            # main: full pipeline, no exceptions (promotion invariant).
            F_SHARED=true F_OPERATOR=true F_API=true F_WWT=true F_SMOKE=true
            F_FRONTEND=true F_HELM=true
            F_IMG_OPERATOR=true F_IMG_API=true F_IMG_WWT=true F_IMG_FRONTEND=true
          fi

          LINT=() ; TEST=()
          [ "$F_SHARED" = "true" ] && { LINT+=(shared); TEST+=(shared); }
          [ "$F_OPERATOR" = "true" ] && { LINT+=(operator); TEST+=(operator); }
          # Dependents: a change in a dependency re-gates the dependent.
          if [ "$F_API" = "true" ] || [ "$F_SHARED" = "true" ] || [ "$F_OPERATOR" = "true" ]; then
            LINT+=(api-server); TEST+=(api-server)
          fi
          if [ "$F_WWT" = "true" ] || [ "$F_SHARED" = "true" ]; then
            LINT+=(wwt); TEST+=(wwt)
          fi
          # test/smoke is lint-only: its tests need a live cluster.
          if [ "$F_SMOKE" = "true" ] || [ "$F_OPERATOR" = "true" ]; then
            LINT+=(test/smoke)
          fi

          to_json() {
            # ${arr[@]:-} yields one empty arg for an empty array: drop it.
            if [ "$#" -eq 0 ]; then echo '[]'; else printf '%s\n' "$@" | jq -cRn '[inputs | select(length > 0)]'; fi
          }
          echo "go_lint=$(to_json "${LINT[@]:-}")" >> "$GITHUB_OUTPUT"
          echo "go_test=$(to_json "${TEST[@]:-}")" >> "$GITHUB_OUTPUT"

          img() { [ "$4" = "true" ] && printf '{"name":"%s","context":"%s","dockerfile":"%s"}\n' "$1" "$2" "$3" || true; }
          {
            img operator   operator operator/Dockerfile   "$F_IMG_OPERATOR"
            img api-server .        api-server/Dockerfile "$F_IMG_API"
            img wwt        .        wwt/Dockerfile        "$F_IMG_WWT"
            img frontend   frontend frontend/Dockerfile   "$F_IMG_FRONTEND"
          } | jq -cs . | sed 's/^/images=/' >> "$GITHUB_OUTPUT"

          echo "frontend=${F_FRONTEND}" >> "$GITHUB_OUTPUT"
          echo "helm=${F_HELM}" >> "$GITHUB_OUTPUT"
          # shared/catalog feeds the generated CRD/schema drift check
          # (gen-catalog-schema) just like operator/api/v1alpha1 does.
          DRIFT=false
          [ "$F_OPERATOR" = "true" ] && DRIFT=true
          [ "$F_SHARED" = "true" ] && DRIFT=true
          # crd-schemas/ is drift-checked output: a hand edit alone must
          # not dodge the gate (push runs always set DRIFT via operator).
          [ "$F_CRDSCHEMAS" = "true" ] && DRIFT=true
          echo "drift=${DRIFT}" >> "$GITHUB_OUTPUT"

  # ------------------------------------------------------------------
  # Delegated domains — see ci-*.yml. Each call job's `if` mirrors the
  # exact condition its jobs used to carry inline.
  # ------------------------------------------------------------------
  go:
    needs: changes
    if: needs.changes.outputs.go_lint != '[]' || needs.changes.outputs.go_test != '[]' || needs.changes.outputs.drift == 'true'
    permissions:
      contents: read
      id-token: write # passed through to ci-go.yml's keyless Codecov upload
    uses: ./.github/workflows/ci-go.yml
    with:
      go_lint: ${{ needs.changes.outputs.go_lint }}
      go_test: ${{ needs.changes.outputs.go_test }}
      drift: ${{ needs.changes.outputs.drift == 'true' }}

  frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    permissions:
      contents: read
      id-token: write # passed through to ci-frontend.yml's keyless Codecov upload
    uses: ./.github/workflows/ci-frontend.yml

  helm:
    needs: changes
    if: needs.changes.outputs.helm == 'true'
    uses: ./.github/workflows/ci-helm.yml

  # Unconditional on every PR and main push: a gate that can be skipped
  # by touching the "right" files is not a gate.
  security:
    uses: ./.github/workflows/ci-security.yml

  images:
    needs: changes
    if: needs.changes.outputs.images != '[]'
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/ci-images.yml
    with:
      images: ${{ needs.changes.outputs.images }}
      push: ${{ github.event_name == 'push' }}

  # ------------------------------------------------------------------
  # OCI chart push — dev build off every main commit. No dedicated Helm
  # chart registry is planned: the chart is pushed as an OCI artifact to
  # ghcr.io (same registry as the component images), under a `charts/`
  # sub-path. `-main.<short-sha>` is a valid SemVer prerelease so it
  # never collides with a released `vX.Y.Z` tag (see the `promote` job).
  # Deliberately NOT delegated to ci-helm.yml and NOT in release-please's
  # `needs`: a chart-oci failure must not block an app release.
  # ------------------------------------------------------------------
  chart-oci:
    needs: changes
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: vars
        run: |
          echo "repo=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install_args: helm # version pinned in .mise.toml
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Package and push dev chart
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login "$REGISTRY" -u "${{ github.actor }}" --password-stdin
          CHART_VERSION="$(helm show chart helm/waas | awk '/^version:/{print $2}')"
          DEV_VERSION="${CHART_VERSION}-main.${{ steps.vars.outputs.sha }}"
          helm package helm/waas --version "$DEV_VERSION" -d dist
          helm push "dist/waas-${DEV_VERSION}.tgz" "oci://$REGISTRY/${{ steps.vars.outputs.repo }}/charts"
          # Moving `0.0.0-edge` tag: same convenience pointer as the images'
          # `edge` tag (ci-images.yml), mirrored onto the chart artifact.
          # Unlike the images (untagged, no SemVer to satisfy), a bare
          # `edge` tag isn't valid SemVer, so `helm pull --version edge`
          # (and kustomize's helmCharts, which goes through the same Helm
          # SDK validation) reject it outright. `0.0.0-edge` is a valid
          # SemVer prerelease with a fixed name — stable regardless of
          # Chart.yaml's own version bumps.
          docker buildx imagetools create \
            -t "$REGISTRY/${{ steps.vars.outputs.repo }}/charts/waas:0.0.0-edge" \
            "$REGISTRY/${{ steps.vars.outputs.repo }}/charts/waas:$DEV_VERSION"

  # ------------------------------------------------------------------
  # Release. release-please (manifest mode, SemVer, conventional commits)
  # maintains TWO independent release PRs (separate-pull-requests: true),
  # like DrummyFloyd/crunchy-userinit-controller:
  #   "."         the app — images, the vX.Y.Z git tag ArgoCD tracks
  #               (Application targetRevision, deploys straight from
  #               git), and Chart.yaml's appVersion (extra-files).
  #   "helm/waas" the chart's OWN SemVer (Chart.yaml `version`), only
  #               used for the OCI chart artifact pushed for external
  #               `helm install --version` consumers — free to diverge
  #               from the app version between chart releases.
  # Merging either PR creates that package's tag + GitHub Release on
  # THAT main run. needs: gates release-please on the full green
  # pipeline, so a tag can only ever point at a releasable SHA.
  # ------------------------------------------------------------------
  release-please:
    needs: [go, frontend, helm, security, images]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
      chart_release_created: ${{ steps.rp.outputs['helm/waas--release_created'] }}
      chart_tag_name: ${{ steps.rp.outputs['helm/waas--tag_name'] }}
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        id: rp
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Promotion of already-tested artifacts, never a rebuild: verify ->
  # re-tag -> keyless cosign -> digest table appended to the Release
  # notes. Signing verification:
  #   cosign verify \
  #     --certificate-identity-regexp 'https://github.com/<owner>/<repo>/\.github/workflows/ci\.yml@.*' \
  #     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
  #     <image>@<digest>
  promote:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write  # edit the Release notes
      packages: write  # push the vX.Y.Z tags
      id-token: write  # keyless cosign (Fulcio/Rekor)
    env:
      COMPONENTS: operator api-server wwt frontend
      TAG: ${{ needs.release-please.outputs.tag_name }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Verify promotion preconditions
        run: |
          set -euo pipefail
          SHORT="${GITHUB_SHA::7}"
          # The chart at the released SHA must reference the release (the
          # git tag is what ArgoCD deploys; image tag defaults to
          # appVersion). release-please bumps appVersion via the
          # x-release-please marker in Chart.yaml — this guards against
          # the marker being dropped. The chart's own `version` field is
          # a separate package (helm/waas) and is NOT checked here.
          grep -Eq "^appVersion:[[:space:]]*\"${TAG}\"[[:space:]]*$" helm/waas/Chart.yaml \
            || { echo "FATAL Chart.yaml 'appVersion' must be \"${TAG}\""; exit 1; }
          for c in $COMPONENTS; do
            IMAGE="$REGISTRY/${GITHUB_REPOSITORY,,}/$c"
            docker buildx imagetools inspect "$IMAGE:$SHORT" >/dev/null \
              || { echo "FATAL $IMAGE:$SHORT not found — promotion source missing"; exit 1; }
            # Release tags are immutable; tolerate an identical re-run
            # (idempotent retry after a partial failure).
            if docker buildx imagetools inspect "$IMAGE:$TAG" >/dev/null 2>&1; then
              SRC=$(docker buildx imagetools inspect "$IMAGE:$SHORT" --format '{{.Manifest.Digest}}')
              DST=$(docker buildx imagetools inspect "$IMAGE:$TAG" --format '{{.Manifest.Digest}}')
              [ "$SRC" = "$DST" ] \
                || { echo "FATAL $IMAGE:$TAG already exists with a DIFFERENT digest — release tags are immutable"; exit 1; }
            fi
          done
      - name: Promote and sign
        run: |
          set -euo pipefail
          SHORT="${GITHUB_SHA::7}"
          printf '\n## Images\n\n| Composant | Image (digest) |\n|---|---|\n' > release-images.md
          for c in $COMPONENTS; do
            IMAGE="$REGISTRY/${GITHUB_REPOSITORY,,}/$c"
            docker buildx imagetools create -t "$IMAGE:$TAG" "$IMAGE:$SHORT"
            DIGEST=$(docker buildx imagetools inspect "$IMAGE:$TAG" --format '{{.Manifest.Digest}}')
            cosign sign --yes \
              -a version="$TAG" -a revision="$GITHUB_SHA" \
              "$IMAGE@$DIGEST"
            # `latest` always points at the newest OFFICIAL release only —
            # never the `edge` dev pointer (ci-images.yml). Same digest as
            # $TAG, so no separate cosign signature is needed.
            docker buildx imagetools create -t "$IMAGE:latest" "$IMAGE:$TAG"
            printf '| %s | `%s@%s` |\n' "$c" "$IMAGE" "$DIGEST" >> release-images.md
          done
      - name: Append digest table to the Release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release view "$TAG" --json body -q .body > notes.md
          cat release-images.md >> notes.md
          gh release edit "$TAG" --notes-file notes.md

  # Independent OCI publish of the chart, gated on the "helm/waas"
  # package's OWN release (its SemVer, not the app's). No repackage-
  # with-override: the committed Chart.yaml at the tagged SHA IS the
  # release. No dedicated Helm chart registry planned — same ghcr.io
  # registry as the images, `charts/` sub-path. External
  # `helm pull`/`helm install --version` consumers only; ArgoCD deploys
  # from git and never reads this artifact.
  promote-chart:
    needs: release-please
    if: needs.release-please.outputs.chart_release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write  # push the chart OCI artifact
    env:
      CHART_TAG: ${{ needs.release-please.outputs.chart_tag_name }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install_args: helm # version pinned in .mise.toml
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Package and push the chart
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login "$REGISTRY" -u "${{ github.actor }}" --password-stdin
          CHART_VERSION="$(helm show chart helm/waas | awk '/^version:/{print $2}')"
          helm package helm/waas -d dist
          helm push dist/waas-*.tgz "oci://$REGISTRY/${GITHUB_REPOSITORY,,}/charts"
          # `latest` always points at the newest OFFICIAL chart release —
          # distinct from the `edge` dev pointer (chart-oci job).
          docker buildx imagetools create \
            -t "$REGISTRY/${GITHUB_REPOSITORY,,}/charts/waas:latest" \
            "$REGISTRY/${GITHUB_REPOSITORY,,}/charts/waas:$CHART_VERSION"
          echo "Pushed chart $CHART_VERSION for $CHART_TAG"
