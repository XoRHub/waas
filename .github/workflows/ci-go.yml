# Go gates — called by ci.yml. Matrix scoped per module by the `changes`
# job's dependency-graph resolution (go_lint/go_test inputs).

name: ci-go

on:
  workflow_call:
    inputs:
      go_lint:
        description: JSON array of module paths to lint.
        required: true
        type: string
      go_test:
        description: JSON array of module paths to test.
        required: true
        type: string
      drift:
        description: Whether operator/** or shared/** changed (gates go-generated-drift).
        required: true
        type: boolean

permissions:
  contents: read

jobs:
  go-lint:
    if: inputs.go_lint != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(inputs.go_lint) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Toolchain from .mise.toml — single source of truth with local dev.
      # Deliberately NOT per-module `go-version-file`: every go.mod's
      # directive is a plain `go 1.26`, so the one 1.26.4 pin satisfies
      # them all (comment on the pin in .mise.toml keeps it that way).
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install_args: go golangci-lint
      # setup-go's built-in module/build cache, now explicit —
      # mise-action only caches the toolchain itself.
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ matrix.module }}-${{ hashFiles(format('{0}/go.sum', matrix.module)) }}
          restore-keys: go-${{ runner.os }}-${{ matrix.module }}-
      - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          install-mode: none # the binary comes from .mise.toml, via mise-action above
          working-directory: ${{ matrix.module }}

  go-test:
    if: inputs.go_test != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # keyless Codecov upload (OIDC, no stored token)
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(inputs.go_test) }}
    # Only the api-server leg talks to postgres (dual-backend repository
    # suites); services cannot be conditional per matrix leg, the other
    # legs simply never connect.
    services:
      postgres:
        image: postgres:17-alpine@sha256:af194ccf3e2d7fe367012c7b88ce8b816c5c889b18a5b316799a1f0d7eac746a
        env:
          POSTGRES_PASSWORD: pg
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Toolchain + cache: same rationale as go-lint above.
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install_args: go
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ matrix.module }}-${{ hashFiles(format('{0}/go.sum', matrix.module)) }}
          restore-keys: go-${{ runner.os }}-${{ matrix.module }}-
      # The operator's test/envtest suite needs a real apiserver+etcd;
      # exporting KUBEBUILDER_ASSETS makes the plain `go test ./...`
      # below run it (the suite skips itself when unset).
      - name: Install envtest control plane
        if: matrix.module == 'operator'
        working-directory: operator
        run: echo "KUBEBUILDER_ASSETS=$(make -s envtest-assets)" >> "$GITHUB_ENV"
      - name: Test
        working-directory: ${{ matrix.module }}
        env:
          # Repository suites run every test against sqlite AND postgres
          # when this is set (see internal/repository/backends_test.go).
          WAAS_TEST_PG_URL: ${{ matrix.module == 'api-server' && 'postgres://postgres:pg@localhost:5432/postgres' || '' }}
        run: |
          # -coverpkg attributes cross-package coverage (the router-level
          # integration tests exercise handler/service code), which is
          # what the ratchet below measures.
          go test -race -covermode=atomic -coverpkg=./... -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out | tail -n 1
      # Per-component coverage (see codecov.yml): flag = module name, so
      # the PR comment and README badges break down by operator/
      # api-server/wwt/shared independently. OIDC, not a stored token —
      # works the same for fork PRs, same posture as the promote job's
      # keyless cosign.
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          use_oidc: true
          files: ${{ matrix.module }}/coverage.out
          flags: ${{ matrix.module }}
          fail_ci_if_error: false
      # Floors sit under today's measured coverage (handler 56%,
      # repository 78% as of T9): they catch regressions only — raise
      # them as coverage grows, never lower them.
      - name: Coverage ratchet
        if: matrix.module == 'api-server'
        run: hack/ci/coverage-ratchet.sh api-server/coverage.out internal/handler:40 internal/repository:50
      # pkg/policy is ratcheted because portal and webhook must decide
      # identically: its coverage was the repo's only regression
      # (84% → 78.7%, audit-2 C20).
      - name: Coverage ratchet (operator)
        if: matrix.module == 'operator'
        run: hack/ci/coverage-ratchet.sh operator/coverage.out pkg/policy:84

  # zz_generated.deepcopy.go, CRDs and operator/docs/guacd-parameters.md
  # are generated and committed; regenerating must be a no-op.
  go-generated-drift:
    if: inputs.drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # go: same rationale as go-lint above. uv: `make manifests` shells
      # out to hack/ci/check_operator_rbac.py (its own pyyaml pin, no
      # venv) to verify the Helm operator ClusterRole against this same
      # regenerated RBAC.
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install_args: go uv
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-operator-${{ hashFiles('operator/go.sum', 'shared/go.sum') }}
          restore-keys: go-${{ runner.os }}-operator-
      - run: make generate manifests docs-params generate-types
      - run: git diff --exit-code -- operator shared helm/waas/crds frontend/src/types.gen.ts
