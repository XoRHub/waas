# Kubernetes manifest gates — called by ci.yml: chart lints and renders,
# every rendered object + gitops/ seed validates against a schema —
# including our own CRs, whose JSON Schemas derive from THIS commit's
# CRDs.
#
# The dev OCI chart push (`chart-oci`) stays inline in ci.yml on purpose:
# it must NOT gate release-please, and bundling it here would (a
# workflow_call job only succeeds if every job inside it succeeds).

name: ci-helm

on:
  workflow_call: {}

permissions:
  contents: read

jobs:
  helm-manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Versions pinned in .mise.toml; its postinstall hook also installs
      # the helm-unittest plugin (pinned there too).
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install_args: helm helm-docs uv
      - name: Lint and render
        run: |
          helm lint helm/waas
          helm template waas helm/waas > rendered-default.yaml
          helm template waas helm/waas -f hack/dev/values-dev.yaml > rendered-dev.yaml
      - name: helm-docs drift check
        run: |
          (cd helm/waas && helm-docs --sort-values-order file)
          git diff --exit-code helm/waas/README.md \
            || { echo "FATAL helm/waas/README.md is stale — run 'make helm-docs' and commit the result"; exit 1; }
      - name: helm unittest
        run: helm unittest helm/waas
      - name: CRDs to JSON Schemas
        # The script declares its own pyyaml pin (PEP 723 inline
        # metadata); uv resolves it into an ephemeral env.
        run: uv run hack/ci/crd_to_jsonschema.py helm/waas/crds crd-schemas
      - name: kubeconform
        # -skip CustomResourceDefinition: no usable upstream schema for the
        # CRD kind itself; CRDs are drift-checked and every CR validates
        # against them here.
        run: |
          docker run --rm -v "$PWD:/work" -w /work \
            ghcr.io/yannh/kubeconform:v0.6.7-alpine \
            -strict -summary \
            -skip CustomResourceDefinition \
            -schema-location default \
            -schema-location 'crd-schemas/{{ .Group }}/{{ .ResourceKind }}_{{ .ResourceAPIVersion }}.json' \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{ .Group }}/{{ .ResourceKind }}_{{ .ResourceAPIVersion }}.json' \
            rendered-default.yaml rendered-dev.yaml \
            gitops/governance/images.yaml gitops/governance/policies.yaml
