# Frontend gates — called by ci.yml: eslint + format check + tsc -b +
# vitest coverage.

name: ci-frontend

on:
  workflow_call: {}

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.17.0
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run typecheck
      - name: Test with coverage
        # Coverage provider installed --no-save at the locked vitest
        # version so the lockfile stays untouched.
        # --coverage.all + include counts every src/ file, not just the
        # ones already imported by a test (audit-2 C14).
        run: |
          npm install --no-save "@vitest/coverage-v8@$(node -p "require('vitest/package.json').version")"
          npx vitest run --coverage.enabled --coverage.provider=v8 --coverage.reporter=text-summary \
            --coverage.all --coverage.include='src/**/*.{ts,tsx}' \
            --coverage.exclude='src/**/*.test.{ts,tsx}' \
            --coverage.exclude='src/types*.ts' --coverage.exclude='**/*.d.ts'
