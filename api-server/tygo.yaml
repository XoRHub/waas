# Generated TypeScript API models (make generate-types, drift-checked in
# CI): api-server/internal/model is the single source; the frontend
# consumes types.gen.ts re-exported through types.ts. External shapes
# (k8s passthrough, auth.Role) map onto the hand-curated types.manual.ts.
packages:
  - path: "github.com/xorhub/waas/api-server/internal/model"
    output_path: "../frontend/src/types.gen.ts"
    frontmatter: |
      /* eslint-disable */
      // Code generated by tygo from api-server/internal/model — DO NOT EDIT.
      // Regenerate with `make generate-types` (drift-checked in CI).
      import type {
        EnvVar,
        Role,
        Toleration,
        WorkspacePlacement,
        WorkspaceSchedule,
        WorkspaceWorkload,
      } from './types.manual';
    type_mappings:
      time.Time: "string /* RFC3339 */"
      corev1.EnvVar: "EnvVar"
      corev1.Toleration: "Toleration"
      # Kept loose like WorkspaceWorkload.securityContext/podSecurityContext
      # in types.manual.ts: the frontend only merges these structurally
      # into Workload YAML, it never reads individual fields.
      corev1.PodSecurityContext: "unknown"
      corev1.SecurityContext: "unknown"
      auth.Role: "Role"
      waasv1alpha1.WorkspaceSchedule: "WorkspaceSchedule"
      waasv1alpha1.WorkspaceWorkload: "WorkspaceWorkload"
      waasv1alpha1.WorkspacePlacement: "WorkspacePlacement"
