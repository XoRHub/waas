# git-cliff configuration — release notes generated at tag time
# (release-notes job). History follows conventional commits.

[changelog]
header = ""
body = """
{% if version %}## {{ version }} ({{ timestamp | date(format="%Y-%m-%d") }})
{% else %}## Unreleased
{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim }}
{% for commit in commits %}- {% if commit.scope %}**{{ commit.scope }}**: {% endif %}{{ commit.message | upper_first }} ({{ commit.id | truncate(length=12, end="") }})
{% endfor %}
{% endfor %}
"""
footer = ""
trim = true

[git]
conventional_commits = true
# Unconventional commits still land in the notes (grouped under Divers)
# instead of silently disappearing.
filter_unconventional = false
protect_breaking_commits = true
tag_pattern = "v[0-9]*"
commit_parsers = [
  { message = "^feat", group = "<!-- 0 -->Fonctionnalités" },
  { message = "^fix", group = "<!-- 1 -->Corrections" },
  { message = "^perf", group = "<!-- 2 -->Performances" },
  { message = "^refactor", group = "<!-- 3 -->Refactoring" },
  { message = "^docs", group = "<!-- 4 -->Documentation" },
  { message = "^(ci|build|chore)", group = "<!-- 5 -->Interne" },
  { message = ".*", group = "<!-- 6 -->Divers" },
]
