# Dev WorkspaceTemplates consuming the images seeded in images-dev.yaml.
# `image` must match the corresponding WorkspaceImage verbatim (see its
# comment) — registry refs (docker.io/xorhub/*) by default, same as prod.
# For local iteration on a waas-images change, `make dev-load-images
# LOCAL_IMAGES="firefox"` builds + imports waas-local/firefox:dev into k3d;
# point this template's `image:` at that tag yourself to actually run it.
apiVersion: waas.xorhub.io/v1alpha1
kind: WorkspaceTemplate
metadata:
  name: ubuntu-xfce
spec:
  displayName: "Ubuntu 24.04 — XFCE"
  description: "Full XFCE desktop over VNC (recommended protocol for Linux)."
  os: linux
  image: docker.io/xorhub/ubuntu-desktop-noble:2.1.1
  homeSize: 10Gi
  resources:
    requests: { cpu: 500m, memory: 1Gi }
    limits: { cpu: "2", memory: 4Gi }
  # No WAAS_DESKTOP_PASSWORD on purpose: the operator generates a
  # per-workspace desktop password (resolver copy waas-desktop-<name>
  # next to the CR, pod copy in the target namespace) — same mechanism
  # as kasm-terminal below.
  env:
    - name: WAAS_VNC_RESOLUTION
      value: "1920x1080"
  # Desktops are stamped as a Deployment (the default kind) with an
  # explicit non-root pod spec. Custom labels/annotations land on the
  # Deployment AND its pods (reserved keys are webhook-denied).
  workload:
    kind: Deployment
    podSecurityContext:
      runAsNonRoot: true
    labels:
      cost-center: waas-dev
    annotations:
      example.com/note: "seeded by hack/dev/templates-dev.yaml"
  # Placement: workloads land in a per-user namespace (bootstrapped by
  # the operator: PSA labels, ResourceQuota from the policy aggregate,
  # default-deny ingress except the platform namespaces). The CR itself
  # stays in the CR namespace (workspaces.namespace — the release
  # namespace by default). cleanup absent = Retain (never deletes
  # user data). NOTE: env here must stay literal — a secretKeyRef would
  # resolve in the TARGET namespace, where dev Secrets are not seeded.
  placement:
    namespace: waas-{user}
    namespaceLabels:
      team: waas-dev
  # Office hours: up weekdays at 08:00, down every day at 20:00 (Paris).
  # A manual pause/resume wins until the next OPPOSITE edge (rule B);
  # the portal card shows the next transition.
  schedule:
    timezone: Europe/Paris
    uptime: ["0 8 * * 1-5"]
    downtime: ["0 20 * * *"]
  # Both protocols the image serves; users may pick either and tune the
  # allow-listed guacd parameters from the portal (tabs per protocol,
  # quick-switch on the card and in-session).
  protocols:
    - name: vnc
      port: 5901
      default: true
      params:
        color-depth: "24"
      # An entry is an exact name or a cat: category selector. cat:audio
      # delegates the WHOLE audio category (enable-audio,
      # audio-servername, and any audio param added to the registry
      # later) without touching this template — that dynamic expansion
      # is the manual test for the cat: syntax. The rest are plain
      # names; placement in the forms is tier-driven (encodings and
      # autoretry are advanced-tier, they render behind their section's
      # disclosure).
      userParams: [cat:audio, color-depth, cursor, swap-red-blue, encodings, autoretry]
    - name: rdp
      port: 3389
      params:
        security: any
        ignore-cert: "true"
      userParams: [color-depth, resize-method]
  # What workspace creators may deviate from this template (admins and
  # the template owner may override anything): schedule = own crons at
  # creation, placement = another OWNED namespace, metadata = extra
  # labels/annotations (denylist enforced server-side).
  overrides:
    allowedFields: [env, resources, protocol, protocolParams, schedule, placement, metadata]
---
apiVersion: waas.xorhub.io/v1alpha1
kind: WorkspaceTemplate
metadata:
  name: dev-ssh
spec:
  displayName: "Dev env — SSH"
  description: "Terminal dev env (git, tmux, build tools) over SSH; VNC fallback."
  os: linux
  # Same underlying image as ubuntu-xfce above — SSH is a capability of the
  # OS-only desktop image (INSTALL_SSH=1 at build time), off by default even
  # then: WAAS_SSH_ENABLED=1 below is what actually turns it on. There is no
  # more standalone "dev-ssh" image (waas-images split, 2026-07-10 catalog).
  image: docker.io/xorhub/ubuntu-desktop-noble:2.1.1
  homeSize: 10Gi
  resources:
    requests: { cpu: 500m, memory: 1Gi }
    limits: { cpu: "2", memory: 4Gi }
  env:
    - name: WAAS_SSH_ENABLED
      value: "1"
    # Keys come from the dev-ssh-credentials Secret, seeded by
    # hack/dev/seed-ssh-secret.sh (make dev-load-images runs it).
    - name: WAAS_SSH_AUTHORIZED_KEYS
      valueFrom:
        secretKeyRef: { name: dev-ssh-credentials, key: authorized-keys }
    - name: WAAS_DESKTOP_PASSWORD
      valueFrom:
        secretKeyRef: { name: dev-ssh-credentials, key: password }
  # NO template placement: this template follows the PRECEDENCE CHAIN
  # (global WAAS_DEFAULT_NAMESPACE_PATTERN, else the built-in
  # "waas-workspaces" shared namespace). The env above references the
  # dev-ssh-credentials Secret and pods resolve secretKeyRef in THEIR OWN
  # namespace — hack/dev/seed-ssh-secret.sh clones the Secret into the
  # default workloads namespace for exactly this reason.
  protocols:
    - name: ssh
      port: 2222
      default: true
      credentialsSecretRef: dev-ssh-credentials
      params:
        color-scheme: green-black
      # Plain names only (the default shape): scrollback and
      # server-alive-interval are advanced-tier, the registry drives
      # their placement.
      userParams: [font-size, color-scheme, read-only, scrollback, server-alive-interval]
    - name: vnc
      port: 5901
      credentialsSecretRef: dev-ssh-credentials
      userParams: [color-depth, read-only]
  overrides:
    allowedFields: [protocol, protocolParams, resources, schedule]
---
# The generated-credentials twin of dev-ssh: NO env, NO Secret, NO seed
# script — declaring the ssh protocol is enough. The operator generates
# the keypair (waas-ssh-<ws> + public-key-only pod copy), turns sshd on
# and guacd receives the private key at connect. Keep BOTH templates:
# dev-ssh exercises the explicit credentialsSecretRef path, this one the
# implicit level-2 path (docs/templates-and-protocols.md § Credentials).
apiVersion: waas.xorhub.io/v1alpha1
kind: WorkspaceTemplate
metadata:
  name: dev-ssh-generated
spec:
  displayName: "Dev env — SSH (generated keys)"
  description: "Same terminal dev env, platform-generated ssh keypair — zero credential config."
  os: linux
  image: docker.io/xorhub/ubuntu-desktop-noble:2.1.1
  homeSize: 10Gi
  resources:
    requests: { cpu: 500m, memory: 1Gi }
    limits: { cpu: "2", memory: 4Gi }
  protocols:
    - name: ssh
      port: 2222
      default: true
      userParams: [font-size, color-scheme, read-only, scrollback, server-alive-interval]
    - name: vnc
      port: 5901
      userParams: [color-depth, read-only]
  overrides:
    allowedFields: [protocol, protocolParams, resources, schedule]
---
apiVersion: waas.xorhub.io/v1alpha1
kind: WorkspaceTemplate
metadata:
  name: ubuntu-firefox
spec:
  displayName: "Firefox (navigation isolée)"
  description: "Firefox durci, session jetable — avec audio (PulseAudio streamé par guacd)."
  os: linux
  image: docker.io/xorhub/firefox:2.0.2
  homeSize: 5Gi
  resources:
    requests: { cpu: 500m, memory: 1536Mi }
    limits: { cpu: "2", memory: 3Gi }
  # No WAAS_DESKTOP_PASSWORD on purpose: per-workspace password
  # generated by the operator (see ubuntu-xfce above).
  # Throwaway sessions get a namespace PER WORKSPACE, deleted once
  # nothing waas-managed remains in it (the home PVC holds it back until
  # the policy TTL reclaims it).
  placement:
    namespace: waas-{user}-{workspace}
    cleanup: DeleteWhenEmpty
  # Audio target of the platform: a browser is the natural manual test
  # (play any video) and the smoke vnc-audio subtest picks this template
  # up via exposeAudioPort — enable-audio is locked on, 4713 opens on the
  # pod + Service so guacd actually reaches PulseAudio. This used to be
  # the legacy-template coverage (no protocols block, synthesized vnc
  # entry); dev now has no legacy-shaped template.
  # Deliberately NO overrides block: this throwaway template never
  # grants protocolParams, so its userParams below must have zero
  # connect-time effect for plain users — the manual test of the
  # template-side gate on /connect (only admins and template owners get
  # through). Do not add allowedFields here while fixing something else.
  protocols:
    - name: vnc
      port: 5901
      default: true
      exposeAudioPort: true
      params:
        enable-audio: "true"
      userParams: [enable-audio, color-depth]
---
# Kasm workspace: web-native KasmVNC endpoint, reverse-proxied by wwt —
# guacd is not involved. No VNC_PW env on purpose: the operator generates
# a per-workspace password Secret (resolver copy next to the CR, pod copy
# in the target namespace). /dev/shm is memory-backed for Chromium-class
# apps (the kasmweb standalone docs run with --shm-size=512m).
apiVersion: waas.xorhub.io/v1alpha1
kind: WorkspaceTemplate
metadata:
  name: kasm-terminal
spec:
  displayName: "Kasm Terminal"
  description: "Terminal web (image officielle kasmweb/terminal, KasmVNC)."
  os: linux
  image: docker.io/kasmweb/terminal:1.19.0
  homeSize: 5Gi
  homeMountPath: /home/kasm-user
  resources:
    requests: { cpu: 500m, memory: 1Gi }
    limits: { cpu: "2", memory: 3Gi }
  env:
    - name: VNC_RESOLUTION
      value: "1920x1080"
  workload:
    kind: Deployment
    podSecurityContext:
      runAsNonRoot: true
    volumes:
      - name: dshm
        emptyDir: { medium: Memory, sizeLimit: 512Mi }
    volumeMounts:
      - name: dshm
        mountPath: /dev/shm
  placement:
    namespace: waas-{user}
  protocols:
    - name: kasmvnc
      port: 6901
      default: true
