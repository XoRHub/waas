# Dev overrides for `make dev-deploy`. Layered on top of helm/waas/values.yaml.
# Images are loaded straight into the k3d node's containerd (make dev-load),
# so pullPolicy is Never — nothing is ever fetched from ghcr.io.
image:
  tag: dev
  pullPolicy: Never

# Traefik ships with k3s/k3d by default; no ingress-nginx install needed.
# TLS reuses the self-signed Issuer the chart already creates for the
# operator's admission webhook ({{ .Release.Name }}-selfsigned, gated by
# operator.webhook.enabled which stays on in dev — the operator needs it).
# Self-signed on purpose: accept the browser warning once, no trust-store
# install. HTTPS exists because the seamless clipboard bridge requires a
# secure context (navigator.clipboard is absent on http://…nip.io); the
# HTTP router keeps working — smoke tests stay on port 8080.
ingress:
  className: traefik
  host: waas.127.0.0.1.nip.io
  tls:
    enabled: true
    issuerRef:
      kind: Issuer
      name: waas-selfsigned

apiServer:
  # Fixed for dev convenience instead of grepping the generated one from logs.
  adminPassword: admin123

# Same rule as adminPolicy (values.yaml): never chart AND gitops for the
# same policy name. Dev governance comes from the real seeds
# (gitops/governance/policies.yaml, applied by dev-deploy) — the chart's
# bootstrap default policy would fight helm's server-side apply over
# every field where the two diverge.
defaultPolicy:
  enabled: false
