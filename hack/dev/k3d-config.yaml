# k3d cluster for local dev. Traefik (bundled with k3s) is kept as the
# ingress controller — no extra installs. Host ports 8080/8443 are mapped
# to the loadbalancer's 80/443 so the chart's ingress is reachable without
# root. HTTPS matters: the seamless clipboard bridge needs a secure
# context, and http://…nip.io is not one (browsers only trust the NAME —
# localhost, *.localhost, literal 127.0.0.1 — not what DNS resolves to).
#
# This file is only read at cluster CREATION. To add the 8443 mapping to
# an existing cluster without rebuilding it:
#   k3d cluster edit waas-dev --port-add "8443:443@loadbalancer"
# (recreates the loadbalancer container only, the cluster survives).
apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: waas-dev
# Pinned k3s image: the default of the k3d pinned in .mise.toml (5.9.0),
# frozen so a k3d upgrade cannot silently change the cluster's k8s
# version underneath existing dev clusters.
image: rancher/k3s:v1.35.5-k3s1
servers: 1
agents: 0
ports:
  - port: "8080:80"
    nodeFilters: ["loadbalancer"]
  - port: "8443:443"
    nodeFilters: ["loadbalancer"]
options:
  kubeconfig:
    updateDefaultKubeconfig: true
    switchCurrentContext: true
