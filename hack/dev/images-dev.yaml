# Dev catalog — mirrors gitops/governance/images.yaml but points at the
# waas-local:dev tags produced by `make dev-build-images`, imported straight
# into the k3d node's containerd by `make dev-load-images` (no registry
# involved). Only images that actually exist in waas-images/ are seeded here
# (ubuntu-devtools in the real catalog has no local manifest yet).
apiVersion: waas.xorhub.io/v1alpha1
kind: WorkspaceImage
metadata:
  name: ubuntu-xfce
spec:
  displayName: "Ubuntu 24.04 — XFCE"
  description: "Bureau XFCE complet (VNC recommandé, RDP disponible)."
  image: waas-local/ubuntu-xfce:dev
  protocols: [vnc, rdp]
  architectures: [amd64, arm64]
  enabled: true
  resources:
    default: { cpu: 500m, memory: 1Gi }
    min:     { cpu: 250m, memory: 512Mi }
    max:     { cpu: "2",  memory: 4Gi }
---
apiVersion: waas.xorhub.io/v1alpha1
kind: WorkspaceImage
metadata:
  name: dev-ssh
spec:
  displayName: "Dev env — SSH"
  description: "Environnement de dev terminal (git, tmux, build tools) via SSH, VNC en secours."
  image: waas-local/dev-ssh:dev
  protocols: [ssh, vnc]
  architectures: [amd64, arm64]
  enabled: true
  resources:
    default: { cpu: 500m, memory: 1Gi }
    min:     { cpu: 250m, memory: 512Mi }
    max:     { cpu: "2",  memory: 4Gi }
---
apiVersion: waas.xorhub.io/v1alpha1
kind: WorkspaceImage
metadata:
  name: ubuntu-firefox
spec:
  displayName: "Firefox (navigation isolée)"
  description: "Firefox durci par policies.json, session jetable idéale."
  image: waas-local/ubuntu-firefox:dev
  protocols: [vnc]
  architectures: [amd64]
  enabled: true
  resources:
    default: { cpu: 500m, memory: 1536Mi }
    max:     { cpu: "2",  memory: 3Gi }
---
# Official Kasm image, pulled straight from Docker Hub (nothing local to
# build/load): the kasmvnc protocol path. terminal is the lightest
# kasmweb image and is published multi-arch.
apiVersion: waas.xorhub.io/v1alpha1
kind: WorkspaceImage
metadata:
  name: kasm-terminal
spec:
  displayName: "Kasm Terminal"
  description: "Terminal web (image officielle kasmweb, accès KasmVNC natif)."
  image: docker.io/kasmweb/terminal:1.19.0
  protocols: [kasmvnc]
  architectures: [amd64, arm64]
  enabled: true
  resources:
    default: { cpu: 500m, memory: 1Gi }
    min:     { cpu: 250m, memory: 512Mi }
    max:     { cpu: "2",  memory: 3Gi }
