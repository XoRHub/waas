# Dev catalog — mirrors gitops/governance/images.yaml, pointed at the
# published registry images (docker.io/xorhub/*, catalog-waas-images.yaml)
# by default: no local build/import needed. For local iteration on a
# waas-images change, `make dev-load-images LOCAL_IMAGES="firefox devtools"`
# builds (via the sibling waas-images checkout, see WAAS_IMAGES_DIR in the
# Makefile) and imports waas-local/<name>:dev into k3d — point the matching
# WorkspaceTemplate's `image:` at that tag yourself to actually run it.
apiVersion: waas.xorhub.io/v1alpha1
kind: WorkspaceImage
metadata:
  name: ubuntu-xfce
spec:
  displayName: "Ubuntu 24.04 — XFCE"
  description: "Bureau XFCE complet (VNC recommandé, RDP/SSH disponibles)."
  image: docker.io/xorhub/ubuntu-desktop-noble:2.1.1
  protocols: [vnc, rdp, ssh]
  architectures: [amd64, arm64]
  enabled: true
  resources:
    default: { cpu: 500m, memory: 1Gi }
    min:     { cpu: 250m, memory: 512Mi }
    max:     { cpu: "2",  memory: 4Gi }
---
# Same underlying image as ubuntu-xfce above (SSH is a capability of
# ubuntu-desktop-noble, not a standalone image since the waas-images
# 2026-07-10 catalog split) — kept as its own entry because the "dev-ssh"
# WorkspaceTemplate enables a different protocol/credential shape.
apiVersion: waas.xorhub.io/v1alpha1
kind: WorkspaceImage
metadata:
  name: dev-ssh
spec:
  displayName: "Dev env — SSH"
  description: "Environnement de dev terminal (git, tmux, build tools) via SSH, VNC en secours."
  image: docker.io/xorhub/ubuntu-desktop-noble:2.1.1
  protocols: [ssh, vnc]
  architectures: [amd64, arm64]
  enabled: true
  resources:
    default: { cpu: 500m, memory: 1Gi }
    min:     { cpu: 250m, memory: 512Mi }
    max:     { cpu: "2",  memory: 4Gi }
---
apiVersion: waas.xorhub.io/v1alpha1
kind: WorkspaceImage
metadata:
  name: ubuntu-firefox
spec:
  displayName: "Firefox (navigation isolée)"
  description: "Firefox durci par policies.json, session jetable idéale."
  image: docker.io/xorhub/firefox:2.0.2
  protocols: [vnc]
  architectures: [amd64]
  enabled: true
  resources:
    default: { cpu: 500m, memory: 1536Mi }
    max:     { cpu: "2",  memory: 3Gi }
---
# Official Kasm image, pulled straight from Docker Hub (nothing local to
# build/load): the kasmvnc protocol path. terminal is the lightest
# kasmweb image and is published multi-arch.
apiVersion: waas.xorhub.io/v1alpha1
kind: WorkspaceImage
metadata:
  name: kasm-terminal
spec:
  displayName: "Kasm Terminal"
  description: "Terminal web (image officielle kasmweb, accès KasmVNC natif)."
  image: docker.io/kasmweb/terminal:1.19.0
  protocols: [kasmvnc]
  architectures: [amd64, arm64]
  enabled: true
  resources:
    default: { cpu: 500m, memory: 1Gi }
    min:     { cpu: 250m, memory: 512Mi }
    max:     { cpu: "2",  memory: 3Gi }
