# Single source of truth for toolchain versions: CI installs from this
# very file too (jdx/mise-action in .github/workflows/), so local and CI
# can no longer drift — a floating local toolchain already produced one
# "passes here, fails in CI" incident (audit 2026-07, C6).
[tools]
go = "1.26.5" # keep >= the modules' `go 1.26` directive (go.work + every go.mod)
node = "22.17.0"
golangci-lint = "2.12.2" # keep >= the go directive of the modules it lints
# k3d pin = the version installed in dev at pin time; the k3s image it
# boots is pinned in hack/dev/k3d-config.yaml (keep both in sync).
k3d = "5.9.0"
helm = "4.2.3"
helm-docs = "1.14.2"
# runs hack/ci/crd_to_jsonschema.py (PEP 723 inline deps — the script
# pins its own pyyaml).
uv = "0.11.29"

[hooks]
# helm-unittest is a helm PLUGIN, not a standalone binary — no mise
# registry entry, so it can't live in [tools]; this pin is its single
# source instead (Renovate bumps it via a customManager in
# renovate.json). postinstall runs on EVERY `mise install`, even a
# no-op one, so CI toolchain-cache hits still get the plugin; mise puts
# the installed tools on the hook's PATH. The grep keeps re-runs
# idempotent and the `command -v` guard skips CI jobs that don't
# install helm. --verify=false: see docs/ci-github.md, "Helm CLI: v4".
postinstall = """
command -v helm >/dev/null 2>&1 || exit 0
helm plugin list 2>/dev/null | grep -q '^unittest' || helm plugin install https://github.com/helm-unittest/helm-unittest --version v1.1.1 --verify=false
"""
