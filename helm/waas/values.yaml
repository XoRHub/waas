# WaaS chart values. cert-manager is the only mandatory external
# prerequisite. KubeVirt is auto-detected by the operator at startup —
# never listed as a prerequisite.

image:
  registry: ghcr.io/xorhub/waas
  tag: "" # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

# Namespace where Workspace/WorkspaceTemplate CRs live. Empty (default)
# = the release namespace, i.e. the same place the operator/api-server
# pods themselves run. Set explicitly to isolate CRs in their own
# namespace instead.
workspaces:
  namespace: ""
  create: true
  # Operator-wide workload placement pattern, applied when a template
  # declares no placement.namespace. Precedence: template pattern > this
  # > built-in "waas-workspaces". Placeholders: {user} {workspace}
  # {templateName} {os} (see docs/placement.md). One key feeds BOTH the
  # operator and the api-server (they must agree); an invalid pattern
  # makes both refuse to start. Changing it only affects NEW workspaces —
  # existing ones keep their frozen spec.targetNamespace.
  defaultNamespacePattern: ""

# Bootstrap of the explicit all-rights admin policy (priority 10000, no
# limits/lifecycle = no caps or TTL, whole catalog, every override
# field, remote workspaces on). The bypass stays a VISIBLE, auditable
# WorkspacePolicy CR — never a code path. Disabled by default because
# gitops/governance/policies.yaml is the canonical channel (ArgoCD);
# enable it only when the chart is your sole governance source, and
# never both at once for the same policy name.
adminPolicy:
  enabled: false
  name: admins
  priority: 10000
  subjects:
    - kind: User
      name: admin
    # Add your IDP admin groups here, e.g.:
    # - kind: Group
    #   name: "waas-admins"

ingress:
  enabled: true
  className: ""
  host: waas.example.com
  tls:
    enabled: true
    # cert-manager issuer used for the public certificate.
    issuerRef:
      kind: ClusterIssuer
      name: ""

# Gateway API alternative to ingress. Can be enabled alongside or instead
# of ingress. TLS is terminated by the Gateway's listener, not here.
httpRoute:
  enabled: false
  # Hostnames to match. Empty = reuse ingress.host.
  hostnames: []
  # Gateway(s) this route attaches to. namespace defaults to the release
  # namespace when empty; sectionName restricts to one listener.
  parentRefs:
    - name: ""
      namespace: ""
      sectionName: ""
  annotations: {}

operator:
  replicas: 1
  webhook:
    enabled: true
  # Comma-separated users/groups exempt from workspace policy checks.
  # Add your GitOps applier SA here if it manages Workspace CRs, e.g.
  # "system:masters,system:serviceaccount:argocd:argocd-application-controller".
  policyBypass: "system:masters"
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits: { memory: 256Mi }

apiServer:
  replicas: 1
  jwtIssuer: waas
  accessTokenTTL: 8h
  connectionTokenTTL: 5m
  # Refresh cadence of the workspace Events panel (server-driven: the
  # frontend honors whatever the API answers, no rebuild needed).
  eventsPollInterval: 10s
  # Bootstrap admin password. Empty = generated and printed once in the
  # api-server logs on first boot.
  adminUsername: admin
  adminPassword: ""
  # SSO login (any OIDC provider). Optional: local login
  # stays available (bootstrap admin, break-glass when the IdP is down)
  # unless disableLocalLogin below opts out of it. When enabled, the IdP's
  # groups claim is mirrored into the user record at every login and
  # drives WorkspacePolicy matching.
  oidc:
    # e.g. https://idp.example.com/application/o/waas/
    issuerURL: ""
    clientID: ""
    # Client secret comes from a Secret (ESO/Vault-friendly). Default:
    # key "oidc-client-secret" of the chart's own <release>-secrets.
    existingSecret: ""
    existingSecretKey: ""
    # This api-server's public callback, e.g.
    # https://waas.example.com/api/v1/auth/oidc/callback
    redirectURL: ""
    # SPA origin for the post-login redirect ("/" when same-origin).
    frontendURL: "/"
    # Most IdPs ship groups in their default profile scope mapping.
    scopes: [openid, profile, email]
    groupsClaim: groups
    # IdP groups granting the platform admin role (synced each login).
    adminGroups: []
    providerName: OIDC
    # Disables local username/password login entirely once set —
    # every account must go through the IdP above. Requires
    # issuerURL/clientID to be set (the api-server refuses to start
    # otherwise). The bootstrap admin account is still CREATED but
    # cannot log in locally while this is true — the break-glass is
    # redeploying with this back to false, signing in as the bootstrap
    # admin, then re-enabling; see
    # docs/studies/18-prompt-feature14-oidc-only-login.md.
    #
    # Set adminGroups (above) at the same time, or no account will
    # ever be able to reach the admin role through SSO — only the
    # bootstrap admin has it, and it becomes unreachable once this
    # flag is true.
    disableLocalLogin: false
  # Wake-on-LAN relay for remote workspaces. A magic packet must be
  # emitted on the target machine's L2 network, which a pod cannot reach —
  # so it is delegated to an external relay (device or agent on that LAN)
  # that the api-server calls over HTTP. Empty relayURL = feature off.
  wol:
    relayURL: ""
    # Optional bearer token for the relay, from a Secret. Default key
    # "wol-relay-token".
    existingSecret: ""
    existingSecretKey: ""
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits: { memory: 512Mi }

wwt:
  replicas: 1
  resources:
    requests: { cpu: 100m, memory: 64Mi }
    limits: { memory: 256Mi }

frontend:
  replicas: 1
  resources:
    requests: { cpu: 10m, memory: 32Mi }
    limits: { memory: 128Mi }

# guacd is the HTML5 gateway. ClusterIP only — never exposed outside the
# cluster; the wwt proxy is its sole client.
guacd:
  image: guacamole/guacd:1.6.0
  replicas: 1
  resources:
    requests: { cpu: 250m, memory: 256Mi }
    limits: { memory: 1Gi }

# Prometheus metrics. Everything is opt-in: /metrics endpoints are only
# SERVED when enabled=true (not merely hidden from the manifests), and
# they are cluster-internal only — the ingress/httproute allow-lists never
# route them. See docs/observability.md for the exposed metrics.
metrics:
  # Serve /metrics on each component: api-server (:8080), wwt (:8081),
  # operator (controller-runtime endpoint, :8080). false disables the
  # endpoints themselves, including the operator's previously always-on
  # controller-runtime metrics server.
  enabled: false
  # Stamp prometheus.io/scrape|port|path annotations on the pods, for a
  # classic Prometheus with kubernetes_sd annotation-based discovery (no
  # prometheus-operator CRDs required). Needs metrics.enabled.
  scrapeAnnotations: false
  # PodMonitor for the OPERATOR (monitoring.coreos.com/v1, requires
  # prometheus-operator CRDs). Pod-level on purpose: the operator has no
  # metrics Service, and a PodMonitor selects pods directly. Needs
  # metrics.enabled.
  podMonitor:
    enabled: false
    # Extra labels so the target Prometheus' podMonitorSelector matches
    # (e.g. release: prometheus for kube-prometheus-stack defaults).
    labels: {}
    interval: 30s
  # ServiceMonitor for api-server + wwt (monitoring.coreos.com/v1,
  # requires prometheus-operator CRDs): both already have a ClusterIP
  # Service carrying the shared http port. Needs metrics.enabled.
  serviceMonitor:
    enabled: false
    labels: {}
    interval: 30s

# Grafana dashboards over the metrics above (helm/waas/dashboards/*.json,
# one file consumed identically by both modes).
grafana:
  dashboards:
    enabled: false
    # "configmap": one ConfigMap per dashboard labeled
    #   grafana_dashboard: "1", picked up by the sidecar of the official
    #   grafana chart / kube-prometheus-stack. No extra operator needed.
    # "operator": one GrafanaDashboard CR (grafana.integreatly.org/
    #   v1beta1) per dashboard, for grafana-operator. Requires its CRDs
    #   and an existing Grafana instance matched by instanceSelector.
    mode: configmap
    # Only used in mode "operator".
    instanceSelector:
      matchLabels: {}
    folder: WaaS

postgres:
  # Set enabled=false and fill externalURL to bring your own PostgreSQL 17.
  enabled: true
  image: postgres:17-alpine
  database: waas
  username: waas
  # Empty = generated once and kept across upgrades.
  password: ""
  storage: 10Gi
  storageClassName: ""
  externalURL: ""
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits: { memory: 1Gi }
