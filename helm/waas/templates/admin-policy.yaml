{{- if .Values.adminPolicy.enabled }}
# Explicit all-rights policy for platform admins. Absent limits/lifecycle
# fields do not constrain (nil = unlimited); the fail-closed default for
# everyone else is untouched — this is just one more policy, resolved by
# priority like any other and visible in the effective-policy audit.
apiVersion: waas.xorhub.io/v1alpha1
kind: WorkspacePolicy
metadata:
  name: {{ .Values.adminPolicy.name }}
  namespace: {{ include "waas.workspacesNamespace" . }}
  labels:
    {{- include "waas.labels" . | nindent 4 }}
spec:
  priority: {{ .Values.adminPolicy.priority }}
  {{- with .Values.adminPolicy.subjects }}
  subjects:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  images:
    {{- toYaml .Values.adminPolicy.images | nindent 4 }}
  {{- with .Values.adminPolicy.limits }}
  limits:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.adminPolicy.lifecycle }}
  lifecycle:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.adminPolicy.clipboard }}
  clipboard:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.adminPolicy.overrides.allowedFields }}
  overrides:
    allowedFields:
      {{- toYaml . | nindent 6 }}
  {{- end }}
  remoteWorkspaces: {{ .Values.adminPolicy.remoteWorkspaces }}
{{- end }}
