{{- if .Values.postgres.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-postgres
  labels:
    app.kubernetes.io/name: waas-postgres
    {{- include "waas.labels" . | nindent 4 }}
    {{- with .Values.postgres.deploymentLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with include "waas.deploymentAnnotations" (dict "root" $ "annotations" .Values.postgres.deploymentAnnotations) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  serviceName: {{ .Release.Name }}-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: waas-postgres
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: waas-postgres
        app.kubernetes.io/instance: {{ .Release.Name }}
        {{- with include "waas.podLabels" (dict "root" $ "podLabels" .Values.postgres.podLabels) }}
        {{- . | nindent 8 }}
        {{- end }}
      {{- with include "waas.podAnnotations" (dict "root" $ "podAnnotations" .Values.postgres.podAnnotations) }}
      annotations:
        {{- . | nindent 8 }}
      {{- end }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 70
        fsGroup: 70
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: postgres
          image: {{ .Values.postgres.image | quote }}
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgres.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgres.username | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.passwordSecretRef.name | default (printf "%s-app-secrets" .Release.Name) }}
                  key: {{ .Values.postgres.passwordSecretRef.key | default "postgres-password" }}
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - name: postgres
              containerPort: 5432
          livenessProbe:
            exec:
              command: [pg_isready, -U, {{ .Values.postgres.username | quote }}]
            initialDelaySeconds: 20
          readinessProbe:
            exec:
              command: [pg_isready, -U, {{ .Values.postgres.username | quote }}]
            initialDelaySeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: [ALL] }
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        {{- with .Values.postgres.storageClassName }}
        storageClassName: {{ . | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.postgres.storage }}
{{- end }}
