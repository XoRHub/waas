{{- $existing := (lookup "v1" "Secret" .Release.Namespace (printf "%s-secrets" .Release.Name)).data | default dict }}
{{- $pgPassword := .Values.postgres.password | default (b64dec (get $existing "postgres-password" | default (randAlphaNum 32 | b64enc))) }}
{{- $internalToken := b64dec (get $existing "internal-token" | default (randAlphaNum 48 | b64enc)) }}
{{- $jwtKey := b64dec (get $existing "jwt-private-key" | default (genPrivateKey "rsa" | b64enc)) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  labels:
    {{- include "waas.labels" . | nindent 4 }}
type: Opaque
stringData:
  postgres-password: {{ $pgPassword | quote }}
  # Shared token authenticating wwt → api-server internal calls.
  internal-token: {{ $internalToken | quote }}
  # RS256 signing key for access and connection tokens.
  jwt-private-key: {{ $jwtKey | quote }}
  {{- if .Values.postgres.enabled }}
  database-url: {{ printf "postgres://%s:%s@%s-postgres:5432/%s?sslmode=disable" .Values.postgres.username $pgPassword .Release.Name .Values.postgres.database | quote }}
  {{- else }}
  database-url: {{ required "postgres.externalURL is required when postgres.enabled=false" .Values.postgres.externalURL | quote }}
  {{- end }}
  {{- if .Values.apiServer.adminPassword }}
  admin-password: {{ .Values.apiServer.adminPassword | quote }}
  {{- end }}
