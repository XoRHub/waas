apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-api-server
  labels:
    # name/instance also live on the Service so the opt-in ServiceMonitor
    # (templates/metrics.yaml) can select it.
    app.kubernetes.io/name: waas-api-server
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "waas.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: waas-api-server
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: 8080
      targetPort: http
