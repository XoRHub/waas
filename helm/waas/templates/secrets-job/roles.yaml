{{- /* Skipped entirely when every secret this chart needs is supplied
externally (see secretsJob.enabled in values.yaml). */}}
{{- if .Values.secretsJob.enabled }}
# RBAC for the pre-install/pre-upgrade secrets-generation hook Job — see
# job.yaml for the full rationale (why a hook Job, not `lookup`).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-secrets-job
  labels:
    {{- include "waas.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-secrets-job
  labels:
    {{- include "waas.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation
rules:
  # Kubernetes cannot scope `create` by resourceNames (the object has no
  # name at authorization time): create is granted bare, everything else
  # stays pinned to the two release secrets.
  - apiGroups: [""]
    resources: [secrets]
    verbs: [create]
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get]
    resourceNames:
      - {{ .Release.Name }}-app-secrets
      - {{ .Release.Name }}-secrets
  - apiGroups: [""]
    resources: [secrets]
    verbs: [patch]
    resourceNames:
      - {{ .Release.Name }}-app-secrets
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-secrets-job
  labels:
    {{- include "waas.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-4"
    helm.sh/hook-delete-policy: before-hook-creation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-secrets-job
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-secrets-job
    namespace: {{ .Release.Namespace }}
{{- end }}
