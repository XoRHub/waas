apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-api-server
  labels:
    {{- include "waas.labels" . | nindent 4 }}
---
# The API server only manipulates WaaS CRs — never pods or VMs directly.
# Its RBAC enforces that boundary at the cluster level.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-api-server
  namespace: {{ .Values.workspaces.namespace }}
  labels:
    {{- include "waas.labels" . | nindent 4 }}
rules:
  - apiGroups: [waas.xorhub.io]
    resources: [workspaces, workspacetemplates]
    verbs: [create, delete, get, list, patch, update, watch]
  # Governance: the admin console writes the catalog and policies
  # straight to the CRDs (ArgoCD only bootstraps them).
  - apiGroups: [waas.xorhub.io]
    resources: [workspaceimages, workspacepolicies]
    verbs: [create, delete, get, list, patch, update, watch]
  # Secrets, scoped to the workspace namespace and deliberately without
  # list/watch:
  #   - get: connect-time resolution of template credentialsSecretRef;
  #   - create/update/delete: the per-entry credentials Secrets of the
  #     Remote Workspaces feature (waas-remote-<id>), written exclusively
  #     by the api-server, never exposed through the API.
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get, create, update, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-api-server
  namespace: {{ .Values.workspaces.namespace }}
  labels:
    {{- include "waas.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-api-server
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-api-server
    namespace: {{ .Release.Namespace }}
---
# Retained volumes (home PVCs surviving their deleted workspace) live in
# the WORKLOAD namespaces, wherever placement put them: the dashboards
# and the quota computation need a cluster-wide, label-selected view.
# Deliberately read+delete only: creation/adoption stays the operator's.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-api-server-volumes
  labels:
    {{- include "waas.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [persistentvolumeclaims]
    # watch: the "volumes" SSE kind (owner-scoped live updates).
    verbs: [get, list, delete, watch]
  # Events panel: aggregated Kubernetes events of a workspace and its
  # children — workloads live in dynamic per-user namespaces, so the
  # reads must be cluster-wide. Child DISCOVERY (label-scoped list over
  # the operator's managed inventory) needs read on those kinds too.
  # Filtering per workspace ownership happens server-side; the UI never
  # sees raw cluster objects.
  - apiGroups: [""]
    resources: [events, pods, services]
    verbs: [get, list]
  - apiGroups: [apps]
    resources: [deployments, statefulsets, replicasets]
    verbs: [get, list]
  - apiGroups: [kubevirt.io]
    resources: [virtualmachines]
    verbs: [get, list]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-api-server-volumes
  labels:
    {{- include "waas.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-api-server-volumes
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-api-server
    namespace: {{ .Release.Namespace }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-api-server
  labels:
    app.kubernetes.io/name: waas-api-server
    {{- include "waas.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.apiServer.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: waas-api-server
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: waas-api-server
        app.kubernetes.io/instance: {{ .Release.Name }}
      {{- with include "waas.scrapeAnnotations" (dict "root" $ "port" 8080) }}
      annotations:
        {{- . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ .Release.Name }}-api-server
      securityContext:
        runAsNonRoot: true
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: api-server
          image: "{{ .Values.image.registry }}/api-server:{{ include "waas.tag" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: WAAS_LISTEN_ADDR
              value: ":8080"
            - name: WAAS_WORKSPACE_NAMESPACE
              value: {{ .Values.workspaces.namespace | quote }}
            # Same placement pattern as the operator (one values key):
            # the api-server resolves it at creation, the webhook
            # re-verifies — they must agree.
            - name: WAAS_DEFAULT_NAMESPACE_PATTERN
              value: {{ .Values.workspaces.defaultNamespacePattern | quote }}
            - name: WAAS_JWT_ISSUER
              value: {{ .Values.apiServer.jwtIssuer | quote }}
            - name: WAAS_ACCESS_TOKEN_TTL
              value: {{ .Values.apiServer.accessTokenTTL | quote }}
            - name: WAAS_CONNECTION_TOKEN_TTL
              value: {{ .Values.apiServer.connectionTokenTTL | quote }}
            - name: WAAS_EVENTS_POLL_INTERVAL
              value: {{ .Values.apiServer.eventsPollInterval | default "10s" | quote }}
            {{- if .Values.metrics.enabled }}
            # Serves Prometheus /metrics on the app port (cluster-internal
            # only — the ingress allow-list never routes it).
            - name: WAAS_METRICS_ENABLED
              value: "true"
            {{- end }}
            - name: WAAS_JWT_PRIVATE_KEY_FILE
              value: /etc/waas/keys/jwt-private-key
            - name: WAAS_ADMIN_USERNAME
              value: {{ .Values.apiServer.adminUsername | quote }}
            - name: WAAS_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: database-url
            - name: WAAS_INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: internal-token
            {{- if .Values.apiServer.adminPassword }}
            - name: WAAS_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: admin-password
            {{- end }}
            {{- with .Values.apiServer.oidc }}
            {{- if .issuerURL }}
            # SSO (any OIDC provider). Local login stays
            # available as break-glass; groups sync at every SSO login.
            - name: WAAS_OIDC_ISSUER
              value: {{ .issuerURL | quote }}
            - name: WAAS_OIDC_CLIENT_ID
              value: {{ .clientID | quote }}
            - name: WAAS_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .existingSecret | default (printf "%s-secrets" $.Release.Name) }}
                  key: {{ .existingSecretKey | default "oidc-client-secret" }}
            - name: WAAS_OIDC_REDIRECT_URL
              value: {{ .redirectURL | quote }}
            - name: WAAS_OIDC_FRONTEND_URL
              value: {{ .frontendURL | default "/" | quote }}
            {{- if .scopes }}
            - name: WAAS_OIDC_SCOPES
              value: {{ join "," .scopes | quote }}
            {{- end }}
            {{- if .groupsClaim }}
            - name: WAAS_OIDC_GROUPS_CLAIM
              value: {{ .groupsClaim | quote }}
            {{- end }}
            {{- if .adminGroups }}
            - name: WAAS_OIDC_ADMIN_GROUPS
              value: {{ join "," .adminGroups | quote }}
            {{- end }}
            {{- if .providerName }}
            - name: WAAS_OIDC_PROVIDER_NAME
              value: {{ .providerName | quote }}
            {{- end }}
            {{- end }}
            {{- end }}
            {{- with .Values.apiServer.wol }}
            {{- if .relayURL }}
            # Wake-on-LAN relay for remote workspaces (magic packet must
            # be emitted on the target's L2; a pod cannot — see docs).
            - name: WAAS_WOL_RELAY_URL
              value: {{ .relayURL | quote }}
            {{- if .existingSecret }}
            - name: WAAS_WOL_RELAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .existingSecret | quote }}
                  key: {{ .existingSecretKey | default "wol-relay-token" | quote }}
            {{- end }}
            {{- end }}
            {{- end }}
          ports:
            - name: http
              containerPort: 8080
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 10
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            initialDelaySeconds: 5
          volumeMounts:
            - name: keys
              mountPath: /etc/waas/keys
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: [ALL] }
            readOnlyRootFilesystem: true
          resources:
            {{- toYaml .Values.apiServer.resources | nindent 12 }}
      volumes:
        - name: keys
          secret:
            secretName: {{ .Release.Name }}-secrets
            items:
              - key: jwt-private-key
                path: jwt-private-key
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-api-server
  labels:
    # name/instance also live on the Service so the opt-in ServiceMonitor
    # (templates/metrics.yaml) can select it.
    app.kubernetes.io/name: waas-api-server
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "waas.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: waas-api-server
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: 8080
      targetPort: http
