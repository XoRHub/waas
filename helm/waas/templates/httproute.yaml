{{- if .Values.httpRoute.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}
  labels:
    {{- include "waas.labels" . | nindent 4 }}
  {{- with .Values.httpRoute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- range .Values.httpRoute.parentRefs }}
    - name: {{ required "httpRoute.parentRefs[].name is required when httpRoute.enabled" .name | quote }}
      {{- if .namespace }}
      namespace: {{ .namespace | quote }}
      {{- end }}
      {{- if .sectionName }}
      sectionName: {{ .sectionName | quote }}
      {{- end }}
    {{- end }}
  hostnames:
    {{- $hostnames := .Values.httpRoute.hostnames }}
    {{- if not $hostnames }}
    {{- $hostnames = list .Values.ingress.host }}
    {{- end }}
    {{- range $hostnames }}
    - {{ . | quote }}
    {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: {{ .Release.Name }}-api-server
          port: 8080
    - matches:
        - path:
            type: Exact
            value: /.well-known/jwks.json
      backendRefs:
        - name: {{ .Release.Name }}-api-server
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /ws
        # KasmVNC sessions: client web app + WebSocket proxied by wwt.
        - path:
            type: PathPrefix
            value: /kasm
      backendRefs:
        - name: {{ .Release.Name }}-wwt
          port: 8081
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ .Release.Name }}-frontend
          port: 8080
{{- end }}
