apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-operator
  labels:
    {{- include "waas.labels" . | nindent 4 }}
---
# Mirrors the +kubebuilder:rbac markers (operator/config/rbac/role.yaml).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-operator
  labels:
    {{- include "waas.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
  - apiGroups: [""]
    resources: [persistentvolumeclaims]
    # update: volume retention — detaching (retained labels) and adopting
    # (relabel live) home volumes mutate PVC metadata in place.
    verbs: [create, delete, get, list, update, watch]
  - apiGroups: [""]
    resources: [pods, services]
    verbs: [create, delete, get, list, watch]
  # Placement: the operator creates the per-user workload namespaces and
  # their bootstrap (quota from the owner's policy, default-deny ingress);
  # delete only fires for the opt-in DeleteWhenEmpty cleanup policy.
  - apiGroups: [""]
    resources: [namespaces]
    verbs: [create, delete, get, list, watch]
  - apiGroups: [""]
    resources: [resourcequotas]
    verbs: [create, get, list, watch]
  # update: the operator's default ingress policy is desired-state (it
  # heals policies stamped before the platform namespace was known —
  # without the platform peer, guacd is locked out of placed desktops).
  - apiGroups: [networking.k8s.io]
    resources: [networkpolicies]
    verbs: [create, get, list, update, watch]
  # update: pause/resume and the uptime/downtime crons scale the workload
  # in place (spec.replicas 0/1, VM spec.running) — without it every
  # scale is Forbidden and pause/resume silently stops working.
  - apiGroups: [apps]
    resources: [deployments, statefulsets]
    verbs: [create, delete, get, list, update, watch]
  - apiGroups: [kubevirt.io]
    resources: [virtualmachines]
    verbs: [create, delete, get, list, update, watch]
  - apiGroups: [waas.xorhub.io]
    resources: [workspacetemplates, workspaceimages, workspacepolicies]
    verbs: [get, list, watch]
  # update: the teardown finalizer of cross-namespace placements.
  - apiGroups: [waas.xorhub.io]
    resources: [workspaces]
    verbs: [delete, get, list, update, watch]
  - apiGroups: [waas.xorhub.io]
    resources: [workspaces/status]
    verbs: [get, patch, update]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-operator
  labels:
    {{- include "waas.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-operator
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-operator
    namespace: {{ .Release.Namespace }}
---
# Leader election.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-operator-leader-election
  labels:
    {{- include "waas.labels" . | nindent 4 }}
rules:
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-operator-leader-election
  labels:
    {{- include "waas.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-operator-leader-election
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-operator
    namespace: {{ .Release.Namespace }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-operator
  labels:
    app.kubernetes.io/name: waas-operator
    {{- include "waas.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.operator.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: waas-operator
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: waas-operator
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ .Release.Name }}-operator
      securityContext:
        runAsNonRoot: true
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: operator
          image: "{{ .Values.image.registry }}/operator:{{ include "waas.tag" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --leader-elect
          env:
            - name: ENABLE_WEBHOOKS
              value: {{ .Values.operator.webhook.enabled | quote }}
            # Namespace where guacd/wwt run: the bootstrap NetworkPolicy of
            # placed workload namespaces lets it in (the workspaces
            # namespace may differ from the release namespace).
            - name: WAAS_PLATFORM_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            # Operator-wide placement pattern (template > this > built-in
            # "waas-workspace"). Same values key as the api-server.
            - name: WAAS_DEFAULT_NAMESPACE_PATTERN
              value: {{ .Values.workspaces.defaultNamespacePattern | quote }}
            # Trusted-writer identity model: only the api-server SA may
            # set spec.owner and the identity annotations on Workspaces.
            - name: WAAS_TRUSTED_WRITERS
              value: "system:serviceaccount:{{ .Release.Namespace }}:{{ .Release.Name }}-api-server"
            # Users/groups exempt from policy checks (GitOps applier,
            # break-glass admins). Keep this list short and audited.
            - name: WAAS_POLICY_BYPASS
              value: {{ .Values.operator.policyBypass | default "system:masters" | quote }}
          ports:
            - name: webhook
              containerPort: 9443
            - name: metrics
              containerPort: 8080
          livenessProbe:
            httpGet: { path: /healthz, port: 8081 }
            initialDelaySeconds: 15
          readinessProbe:
            httpGet: { path: /readyz, port: 8081 }
            initialDelaySeconds: 5
          {{- if .Values.operator.webhook.enabled }}
          volumeMounts:
            - name: webhook-certs
              mountPath: /tmp/k8s-webhook-server/serving-certs
              readOnly: true
          {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: [ALL] }
            readOnlyRootFilesystem: true
          resources:
            {{- toYaml .Values.operator.resources | nindent 12 }}
      {{- if .Values.operator.webhook.enabled }}
      volumes:
        - name: webhook-certs
          secret:
            secretName: {{ .Release.Name }}-operator-webhook-cert
      {{- end }}
