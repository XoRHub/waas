# RBAC for the pre-install/pre-upgrade JWT signing-key hook Job — see
# job.yaml for the full rationale (why its own Job/Secret, never
# disableable). Unlike secrets-job, this one has no enabled gate.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-jwt-job
  labels:
    {{- include "waas.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-jwt-job
  labels:
    {{- include "waas.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation
rules:
  # Kubernetes cannot scope `create` by resourceNames (the object has no
  # name at authorization time): create is granted bare, everything else
  # stays pinned to the exact secrets involved.
  - apiGroups: [""]
    resources: [secrets]
    verbs: [create]
  # get on the pre-split/legacy secrets too: migrating an existing
  # jwt-private-key into the dedicated Secret below on upgrade must
  # never mint a fresh key — that would invalidate every issued token
  # (see job.yaml).
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get]
    resourceNames:
      - {{ .Release.Name }}-jwt-signing-key
      - {{ .Release.Name }}-app-secrets
      - {{ .Release.Name }}-secrets
  - apiGroups: [""]
    resources: [secrets]
    verbs: [patch]
    resourceNames:
      - {{ .Release.Name }}-jwt-signing-key
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-jwt-job
  labels:
    {{- include "waas.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-4"
    helm.sh/hook-delete-policy: before-hook-creation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-jwt-job
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-jwt-job
    namespace: {{ .Release.Namespace }}
