{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}
  labels:
    {{- include "waas.labels" . | nindent 4 }}
  annotations:
    {{- if and .Values.ingress.tls.enabled .Values.ingress.tls.issuerRef.name }}
    {{- if eq .Values.ingress.tls.issuerRef.kind "ClusterIssuer" }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.tls.issuerRef.name | quote }}
    {{- else }}
    cert-manager.io/issuer: {{ .Values.ingress.tls.issuerRef.name | quote }}
    {{- end }}
    {{- end }}
    # Long-lived desktop streams over WebSocket.
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . | quote }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts: [{{ .Values.ingress.host | quote }}]
      secretName: {{ .Release.Name }}-public-tls
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-api-server
                port: { name: http }
          - path: /.well-known/jwks.json
            pathType: Exact
            backend:
              service:
                name: {{ .Release.Name }}-api-server
                port: { name: http }
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-wwt
                port: { name: http }
          # KasmVNC sessions: the client web app and its WebSocket are
          # reverse-proxied by wwt under /kasm/{sessionID}/.
          - path: /kasm
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-wwt
                port: { name: http }
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-frontend
                port: { name: http }
{{- end }}
