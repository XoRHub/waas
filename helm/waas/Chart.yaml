apiVersion: v2
name: waas
description: >-
  Kubernetes-native Workspace-as-a-Service: browser-accessible Linux (VNC)
  and Windows (RDP via KubeVirt) desktops, declared as Kubernetes resources.
  The only external prerequisite is cert-manager.
type: application
# version: the chart's OWN SemVer, bumped natively by release-please's
# "helm" package strategy (helm/waas package) — independent of the app.
version: 0.1.0
# appVersion: the app's version (default image tag), bumped by the root
# "." package via extra-files. The block-marker updater only rewrites the
# numeric part, so the "v" prefix (matching the promoted vX.Y.Z image
# tags) is preserved. Keep this block scoped to appVersion ONLY — if it
# wraps `version` too, the root package's release would also touch the
# chart's own SemVer.
# x-release-please-start-version
appVersion: "v0.2.0"
# x-release-please-end
kubeVersion: ">=1.26.0-0"
home: https://github.com/xorhub/waas
sources:
  - https://github.com/xorhub/waas
keywords:
  - vdi
  - workspace
  - remote-desktop
  - guacamole
