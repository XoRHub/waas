---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: workspaceimages.waas.xorhub.io
spec:
  group: waas.xorhub.io
  names:
    kind: WorkspaceImage
    listKind: WorkspaceImageList
    plural: workspaceimages
    shortNames:
    - wsi
    singular: workspaceimage
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.displayName
      name: Display Name
      type: string
    - jsonPath: .spec.image
      name: Image
      type: string
    - jsonPath: .spec.enabled
      name: Enabled
      type: boolean
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: WorkspaceImage is an admin-approved catalog entry.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              WorkspaceImageSpec is one admin-approved catalog entry. Only images
              present in the catalog AND enabled can be referenced (through a
              WorkspaceTemplate) by a Workspace; everything else is rejected at
              admission. The catalog is deliberately separate from WorkspaceTemplate:
              the template says HOW to deploy, this object records WHAT is approved
              and for WHOM, and disabling it must not tear the template down.
            properties:
              allowedGroups:
                description: |-
                  AllowedGroups restricts this image to members of at least one of
                  these Authentik groups. Empty = every authenticated user (still
                  subject to the policy's image subset).
                items:
                  type: string
                type: array
              architectures:
                description: |-
                  Architectures the image is published for. The operator turns this
                  into node affinity (ARM64 control-plane vs AMD64 workers). Empty
                  means any node.
                items:
                  enum:
                  - amd64
                  - arm64
                  type: string
                type: array
              description:
                description: Description is shown to users when picking an image.
                type: string
              displayName:
                description: DisplayName is the human-facing name shown in the portal
                  catalog.
                minLength: 1
                type: string
              enabled:
                default: true
                description: |-
                  Enabled is the admin kill-switch: false blocks NEW workspaces
                  immediately (existing ones keep running, see grandfathering) while
                  keeping the entry, its history and its group bindings in place.
                type: boolean
              image:
                description: |-
                  Image is the exact reference approved by the admin. Templates must
                  match it verbatim; pin the digest for immutability (the waas-images
                  pipeline publishes immutable tags precisely for this).
                minLength: 1
                type: string
              protocols:
                description: |-
                  Protocols the image can serve. A template using this image must
                  pick a port whose protocol is listed here.
                items:
                  description: Protocol is a desktop protocol a workspace image can
                    serve.
                  enum:
                  - vnc
                  - rdp
                  type: string
                minItems: 1
                type: array
              resources:
                description: |-
                  Resources are the per-workspace sizing hints and hard bounds for
                  this image.
                properties:
                  default:
                    description: Default is applied by the portal when the user does
                      not choose.
                    properties:
                      cpu:
                        anyOf:
                        - type: integer
                        - type: string
                        pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                        x-kubernetes-int-or-string: true
                      memory:
                        anyOf:
                        - type: integer
                        - type: string
                        pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                        x-kubernetes-int-or-string: true
                    type: object
                  max:
                    description: |-
                      Max caps a single workspace of this image regardless of policy.
                      The effective per-workspace cap is min(image.max, policy.perWorkspace).
                    properties:
                      cpu:
                        anyOf:
                        - type: integer
                        - type: string
                        pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                        x-kubernetes-int-or-string: true
                      memory:
                        anyOf:
                        - type: integer
                        - type: string
                        pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                        x-kubernetes-int-or-string: true
                    type: object
                  min:
                    description: Min rejects undersized workspaces (an IDE image needs
                      real memory).
                    properties:
                      cpu:
                        anyOf:
                        - type: integer
                        - type: string
                        pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                        x-kubernetes-int-or-string: true
                      memory:
                        anyOf:
                        - type: integer
                        - type: string
                        pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                        x-kubernetes-int-or-string: true
                    type: object
                type: object
            required:
            - displayName
            - enabled
            - image
            - protocols
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources: {}
