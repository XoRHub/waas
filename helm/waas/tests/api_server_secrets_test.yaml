suite: api-server per-usage secret sourcing (database URL, admin password, OIDC)
templates:
  - api-server/deployment.yaml
release:
  name: waas
tests:
  - it: reads the database URL from the release-managed secret when externalURLSecretRef is unset
    set:
      postgres.externalURLSecretRef.name: ""
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="WAAS_DATABASE_URL")].valueFrom.secretKeyRef.name
          value: waas-app-secrets
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="WAAS_DATABASE_URL")].valueFrom.secretKeyRef.key
          value: database-url

  - it: reads the database URL directly from externalURLSecretRef when set
    set:
      postgres.externalURLSecretRef.name: my-db-secret
      postgres.externalURLSecretRef.key: url
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="WAAS_DATABASE_URL")].valueFrom.secretKeyRef.name
          value: my-db-secret
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="WAAS_DATABASE_URL")].valueFrom.secretKeyRef.key
          value: url

  - it: omits the admin password env when neither adminPassword nor adminPasswordSecretRef is set
    set:
      apiServer.adminPassword: ""
      apiServer.adminPasswordSecretRef.name: ""
    asserts:
      - notExists:
          path: spec.template.spec.containers[0].env[?(@.name=="WAAS_ADMIN_PASSWORD")]

  - it: sources the admin password from the release-managed secret when adminPassword is a plain value
    set:
      apiServer.adminPassword: some-plain-password
      apiServer.adminPasswordSecretRef.name: ""
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="WAAS_ADMIN_PASSWORD")].valueFrom.secretKeyRef.name
          value: waas-app-secrets
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="WAAS_ADMIN_PASSWORD")].valueFrom.secretKeyRef.key
          value: admin-password

  - it: sources the admin password directly from adminPasswordSecretRef when set, even without a plain value
    set:
      apiServer.adminPassword: ""
      apiServer.adminPasswordSecretRef.name: my-admin-secret
      apiServer.adminPasswordSecretRef.key: pw
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="WAAS_ADMIN_PASSWORD")].valueFrom.secretKeyRef.name
          value: my-admin-secret
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="WAAS_ADMIN_PASSWORD")].valueFrom.secretKeyRef.key
          value: pw

  - it: OIDC activates from issuerURLSecretRef alone, without a plain issuerURL value
    set:
      apiServer.oidc.issuerURL: ""
      apiServer.oidc.issuerURLSecretRef.name: my-oidc-secret
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="WAAS_OIDC_ISSUER")].valueFrom.secretKeyRef.name
          value: my-oidc-secret
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="WAAS_OIDC_ISSUER")].valueFrom.secretKeyRef.key
          value: issuer-url

  - it: each OIDC connection field is sourced independently — plain value and secretRef can be mixed
    set:
      apiServer.oidc.issuerURL: https://idp.example.com
      apiServer.oidc.clientID: ""
      apiServer.oidc.clientIDSecretRef.name: my-oidc-secret
      apiServer.oidc.clientIDSecretRef.key: client-id-key
      apiServer.oidc.redirectURL: https://waas.example.com/callback
      apiServer.oidc.redirectURLSecretRef.name: ""
    asserts:
      # issuerURL: plain value used as-is (no secretRef set for it here)
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="WAAS_OIDC_ISSUER")].value
          value: https://idp.example.com
      # clientID: sourced from its own secretRef
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="WAAS_OIDC_CLIENT_ID")].valueFrom.secretKeyRef.name
          value: my-oidc-secret
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="WAAS_OIDC_CLIENT_ID")].valueFrom.secretKeyRef.key
          value: client-id-key
      # redirectURL: plain value, unaffected by clientID's secretRef
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="WAAS_OIDC_REDIRECT_URL")].value
          value: https://waas.example.com/callback
