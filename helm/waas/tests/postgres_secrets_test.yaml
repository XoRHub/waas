suite: postgres password sourcing
templates:
  - postgres/statefulset.yaml
release:
  name: waas
tests:
  - it: reads the password from the release-managed secret when passwordSecretRef is unset
    set:
      postgres.enabled: true
      postgres.passwordSecretRef.name: ""
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="POSTGRES_PASSWORD")].valueFrom.secretKeyRef.name
          value: waas-app-secrets
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="POSTGRES_PASSWORD")].valueFrom.secretKeyRef.key
          value: postgres-password

  - it: reads the password directly from passwordSecretRef when set
    set:
      postgres.enabled: true
      postgres.passwordSecretRef.name: my-pg-secret
      postgres.passwordSecretRef.key: pw
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="POSTGRES_PASSWORD")].valueFrom.secretKeyRef.name
          value: my-pg-secret
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="POSTGRES_PASSWORD")].valueFrom.secretKeyRef.key
          value: pw
