suite: secrets-job hook (enable toggle + password/URL sourcing)
templates:
  - secrets-job/roles.yaml
  - secrets-job/job.yaml
release:
  name: waas
tests:
  - it: renders nothing at all when secretsJob.enabled is false
    set:
      secretsJob.enabled: false
      postgres.enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: renders the RBAC and the Job when secretsJob.enabled is true
    set:
      secretsJob.enabled: true
      postgres.enabled: true
    asserts:
      - hasDocuments:
          count: 3
        template: secrets-job/roles.yaml
      - hasDocuments:
          count: 1
        template: secrets-job/job.yaml

  - it: pulls PG_PASSWORD_OVERRIDE from passwordSecretRef when set, to compose a correct database-url
    set:
      secretsJob.enabled: true
      postgres.enabled: true
      postgres.passwordSecretRef.name: my-pg-secret
      postgres.passwordSecretRef.key: pw
    template: secrets-job/job.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="PG_PASSWORD_OVERRIDE")].valueFrom.secretKeyRef.name
          value: my-pg-secret
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="PG_PASSWORD_OVERRIDE")].valueFrom.secretKeyRef.key
          value: pw

  - it: falls back to the plain postgres.password value when passwordSecretRef is unset
    set:
      secretsJob.enabled: true
      postgres.enabled: true
      postgres.passwordSecretRef.name: ""
      postgres.password: a-plain-password
    template: secrets-job/job.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="PG_PASSWORD_OVERRIDE")].value
          value: a-plain-password

  - it: skips the EXTERNAL_DATABASE_URL requirement when externalURLSecretRef is set
    set:
      secretsJob.enabled: true
      postgres.enabled: false
      postgres.externalURL: ""
      postgres.externalURLSecretRef.name: my-db-secret
    template: secrets-job/job.yaml
    asserts:
      - notExists:
          path: spec.template.spec.containers[0].env[?(@.name=="EXTERNAL_DATABASE_URL")]

  - it: still requires externalURL or externalURLSecretRef when postgres.enabled is false
    set:
      secretsJob.enabled: true
      postgres.enabled: false
      postgres.externalURL: ""
      postgres.externalURLSecretRef.name: ""
    template: secrets-job/job.yaml
    asserts:
      - failedTemplate:
          errorMessage: "postgres.externalURL or postgres.externalURLSecretRef is required when postgres.enabled=false"
