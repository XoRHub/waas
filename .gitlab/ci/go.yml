# Go quality gates: golangci-lint + tests with coverage per module, plus
# the generated-files drift check (controller-gen output and the params
# doc are committed; regenerating must be a no-op).

.go-cache:
  variables:
    GOMODCACHE: $CI_PROJECT_DIR/.cache/go-mod
    GOCACHE: $CI_PROJECT_DIR/.cache/go-build
    GOFLAGS: -buildvcs=false
  cache:
    key:
      files: [go.work.sum]
    paths: [.cache/go-mod]

go-lint:
  stage: lint
  extends: [.go-cache, .rules-go]
  # The image bundles its own Go toolchain — it must be built with a Go
  # >= the modules' go directive (a go1.25-built binary panics on go1.26
  # code), so bump this pin whenever the go directive moves.
  image: golangci/golangci-lint:v2.12.2
  needs: []
  parallel:
    matrix:
      - MODULE: [shared, operator, api-server, wwt, test/smoke]
  script:
    - cd "$MODULE"
    - golangci-lint run --timeout 5m

go-test:
  stage: test
  extends: [.go-cache, .rules-go]
  image: golang:1.26.4
  needs: []
  # Postgres backs the api-server dual-backend repository suites (see
  # internal/repository/backends_test.go); the other matrix legs simply
  # never connect to it.
  services:
    - name: postgres:17-alpine
      alias: postgres
  variables:
    POSTGRES_PASSWORD: pg
  parallel:
    matrix:
      # test/smoke is excluded: it needs a live cluster (smoke-connections
      # job); go-lint still compiles it.
      - MODULE: [shared, operator, api-server, wwt]
  script:
    - cd "$MODULE"
    # The operator's test/envtest suite needs a real apiserver+etcd;
    # exporting KUBEBUILDER_ASSETS makes the plain `go test ./...` run
    # it (the suite skips itself when unset).
    - |
      if [ "$MODULE" = "operator" ]; then
        export KUBEBUILDER_ASSETS="$(make -s envtest-assets)"
      fi
    # api-server: -coverpkg attributes cross-package coverage (the
    # router-level integration tests exercise handler/repository code),
    # which is what the ratchet below measures — the floors are
    # calibrated on cross-package numbers, not per-package ones.
    - |
      if [ "$MODULE" = "api-server" ]; then
        export WAAS_TEST_PG_URL="postgres://postgres:pg@postgres:5432/postgres"
        for i in $(seq 1 30); do (echo > /dev/tcp/postgres/5432) 2>/dev/null && break; sleep 1; done
        go test -race -covermode=atomic -coverpkg=./... -coverprofile=coverage.out ./...
      else
        go test -race -covermode=atomic -coverprofile=coverage.out ./...
      fi
    - go tool cover -func=coverage.out | tail -n 1
    # Floors catch regressions only — raise them as coverage grows,
    # never lower them (mirrors .github/workflows/ci.yml). pkg/policy is
    # ratcheted because portal and webhook must decide identically: its
    # coverage was the repo's only regression (84% → 78.7%, audit-2 C20).
    - |
      if [ "$MODULE" = "api-server" ]; then
        "$CI_PROJECT_DIR/hack/ci/coverage-ratchet.sh" coverage.out internal/handler:40 internal/repository:50
      elif [ "$MODULE" = "operator" ]; then
        "$CI_PROJECT_DIR/hack/ci/coverage-ratchet.sh" coverage.out pkg/policy:84
      fi
    - go run github.com/boumenot/gocover-cobertura@v1.2.0 < coverage.out > coverage.xml
  coverage: '/total:\s+\(statements\)\s+(\d+(?:\.\d+)?)%/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: $MODULE/coverage.xml

# zz_generated.deepcopy.go, CRDs (operator/config + helm/waas/crds) and
# docs/guacd-parameters.md are generated and committed; a change under
# api/v1alpha1 without regeneration would ship a chart whose CRDs lie.
go-generated-drift:
  stage: lint
  extends: .go-cache
  image: golang:1.26.4
  needs: []
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - operator/**/*
        - .gitlab-ci.yml
        - .gitlab/ci/**/*
  script:
    - make generate manifests docs-params
    - git diff --exit-code -- operator helm/waas/crds docs
