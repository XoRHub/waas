# Frontend gates: eslint + TypeScript project build check + vitest with
# coverage.

.frontend-base:
  image: node:22.17.0-alpine
  variables:
    npm_config_cache: $CI_PROJECT_DIR/.cache/npm
  cache:
    key:
      files: [frontend/package-lock.json]
    paths: [.cache/npm]
  before_script:
    - cd frontend
    - npm ci

frontend-lint:
  stage: lint
  extends: [.frontend-base, .rules-frontend]
  needs: []
  script:
    - npm run lint

frontend-typecheck:
  stage: lint
  extends: [.frontend-base, .rules-frontend]
  needs: []
  script:
    - npm run typecheck

frontend-test:
  stage: test
  extends: [.frontend-base, .rules-frontend]
  needs: []
  script:
    # Coverage provider installed --no-save at the exact version of the
    # locked vitest, so the lockfile stays untouched. Move it to
    # devDependencies if coverage becomes a ratchet.
    - npm install --no-save "@vitest/coverage-v8@$(node -p "require('vitest/package.json').version")"
    # --coverage.all + include counts every src/ file, not just the ones
    # already imported by a test — without it the number is inflated
    # (62% vs ~41% real, audit-2 C14).
    - npx vitest run --coverage.enabled --coverage.provider=v8
      --coverage.reporter=text-summary --coverage.reporter=cobertura
      --coverage.all --coverage.include='src/**/*.{ts,tsx}'
      --coverage.exclude='src/**/*.test.{ts,tsx}'
      --coverage.exclude='src/types*.ts' --coverage.exclude='**/*.d.ts'
  coverage: '/Statements\s*:\s*([\d.]+)%/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: frontend/coverage/cobertura-coverage.xml
