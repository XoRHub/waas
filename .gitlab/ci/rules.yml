# Shared rules templates. rules:changes only gates MERGE REQUEST
# pipelines (selective builds); on the default branch every job runs so
# that each main SHA carries the complete, releasable image set —
# release promotion (see release.yml) depends on it.
#
# Per-component change scopes follow the REAL dependency graph:
#   - api-server's Dockerfile copies shared/ + operator/{api,pkg} — a
#     change there must rebuild the api-server image too;
#   - wwt's Dockerfile copies shared/;
#   - operator's image is self-contained.

.rules-go:
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - shared/**/*
        - operator/**/*
        - api-server/**/*
        - wwt/**/*
        - test/smoke/**/*
        - go.work
        - go.work.sum
        - .golangci.yml
        - .gitlab-ci.yml
        - .gitlab/ci/**/*

.rules-frontend:
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - frontend/**/*
        - .gitlab-ci.yml
        - .gitlab/ci/**/*

.rules-manifests:
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - helm/**/*
        - gitops/**/*
        - hack/dev/*.yaml
        - hack/ci/*
        - operator/api/**/*
        - operator/config/**/*
        - .gitlab-ci.yml
        - .gitlab/ci/**/*

# Security jobs run on every MR and main pipeline, unconditionally:
# a gate that can be skipped by touching the "right" files is not a gate.
.rules-security:
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

.rules-build-operator:
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - operator/**/*
        - .gitlab-ci.yml
        - .gitlab/ci/**/*

.rules-build-api-server:
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - api-server/**/*
        - shared/**/*
        - operator/api/**/*
        - operator/pkg/**/*
        - operator/go.mod
        - operator/go.sum
        - .gitlab-ci.yml
        - .gitlab/ci/**/*

.rules-build-wwt:
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - wwt/**/*
        - shared/**/*
        - .gitlab-ci.yml
        - .gitlab/ci/**/*

.rules-build-frontend:
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - frontend/**/*
        - .gitlab-ci.yml
        - .gitlab/ci/**/*

.rules-release:
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
