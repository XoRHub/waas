# Kubernetes manifest gates: chart lints and renders, and every rendered
# object + every gitops/ seed validates against a schema — including our
# own CRs, whose JSON Schemas are derived from THIS commit's CRDs
# (hack/ci/crd_to_jsonschema.py). Chart/CRD drift fails in the MR, not
# in ArgoCD.

helm-render:
  stage: lint
  extends: .rules-manifests
  image:
    name: alpine/helm:3.17.3
    entrypoint: [""]
  needs: []
  script:
    - helm lint helm/waas
    - helm template waas helm/waas > rendered-default.yaml
    - helm template waas helm/waas -f hack/dev/values-dev.yaml > rendered-dev.yaml
  artifacts:
    paths: [rendered-default.yaml, rendered-dev.yaml]
    expire_in: 1 week

crd-schemas:
  stage: lint
  extends: .rules-manifests
  image: python:3.12-slim
  needs: []
  script:
    - pip install --no-cache-dir pyyaml==6.0.2
    - python3 hack/ci/crd_to_jsonschema.py helm/waas/crds crd-schemas
  artifacts:
    paths: [crd-schemas/]
    expire_in: 1 week

kubeconform:
  stage: lint
  extends: .rules-manifests
  image:
    name: ghcr.io/yannh/kubeconform:v0.6.7-alpine
    entrypoint: [""]
  needs: [helm-render, crd-schemas]
  script:
    # -skip CustomResourceDefinition: kubernetes-json-schema no longer
    # ships a usable schema for the CRD kind itself. The CRDs are
    # controller-gen output guarded by go-generated-drift, and every CR
    # is validated AGAINST them here — nothing escapes unvalidated.
    - /kubeconform -strict -summary
      -skip CustomResourceDefinition
      -schema-location default
      -schema-location 'crd-schemas/{{ .Group }}/{{ .ResourceKind }}_{{ .ResourceAPIVersion }}.json'
      -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{ .Group }}/{{ .ResourceKind }}_{{ .ResourceAPIVersion }}.json'
      rendered-default.yaml rendered-dev.yaml
      gitops/governance/images.yaml gitops/governance/policies.yaml

hadolint:
  stage: lint
  extends: .rules-security
  image: hadolint/hadolint:2.12.0-alpine
  needs: []
  script:
    # waas-images/ Dockerfiles are linted by their own child pipeline.
    - hadolint --failure-threshold warning
      operator/Dockerfile api-server/Dockerfile wwt/Dockerfile frontend/Dockerfile

shellcheck:
  stage: lint
  extends: .rules-security
  image: koalaman/shellcheck-alpine:v0.10.0
  needs: []
  script:
    # -S warning: same gate level as hadolint (info/style stay advisory).
    - shellcheck -S warning .gitlab/ci/*.sh hack/dev/*.sh hack/*.sh
