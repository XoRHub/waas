# Catalog: the only images a Workspace may run. The `image` field must
# match the WorkspaceTemplate's image VERBATIM — pin digests (published
# as immutable tags by the waas-images pipeline).
apiVersion: waas.xorhub.io/v1alpha1
kind: WorkspaceImage
metadata:
  name: ubuntu-xfce
spec:
  displayName: "Ubuntu 24.04 — XFCE"
  description: "Bureau XFCE complet (VNC recommandé, RDP/SSH disponibles)."
  image: docker.io/xorhub/ubuntu-desktop-noble:2.0.1
  protocols: [vnc, rdp, ssh]
  architectures: [amd64, arm64]
  enabled: true
  # allowedGroups vide : visible de tout utilisateur authentifié
  # (le sous-ensemble `images` de sa policy s'applique toujours).
  resources:
    default: { cpu: 500m, memory: 1Gi }
    min:     { cpu: 250m, memory: 512Mi }
    max:     { cpu: "2",  memory: 4Gi }
---
apiVersion: waas.xorhub.io/v1alpha1
kind: WorkspaceImage
metadata:
  name: ubuntu-firefox
spec:
  displayName: "Firefox (navigation isolée)"
  description: "Firefox durci par policies.json, session jetable idéale."
  image: docker.io/xorhub/firefox:2.0.1
  protocols: [vnc]
  architectures: [amd64]   # packages.mozilla.org: arm64 non validé
  enabled: true
  resources:
    default: { cpu: 500m, memory: 1536Mi }
    max:     { cpu: "2",  memory: 3Gi }
---
apiVersion: waas.xorhub.io/v1alpha1
kind: WorkspaceImage
metadata:
  name: dev-ssh
spec:
  displayName: "Dev env — SSH"
  description: "Environnement de dev terminal (git, tmux, build tools) via SSH, VNC en secours."
  # Same underlying image as ubuntu-xfce above — SSH is a capability of
  # ubuntu-desktop-noble (INSTALL_SSH=1 at build, WAAS_SSH_ENABLED=1 at
  # runtime), not a standalone image since the waas-images 2026-07-10 split.
  image: docker.io/xorhub/ubuntu-desktop-noble:2.0.1
  protocols: [ssh, vnc]
  architectures: [amd64, arm64]
  enabled: true
  resources:
    default: { cpu: 500m, memory: 1Gi }
    min:     { cpu: 250m, memory: 512Mi }
    max:     { cpu: "2",  memory: 4Gi }
---
apiVersion: waas.xorhub.io/v1alpha1
kind: WorkspaceImage
metadata:
  name: ubuntu-devtools
spec:
  displayName: "Dev Tools (VS Code, toolchains)"
  description: "Poste de dev — réservé au groupe IdP nymphe:dev."
  image: docker.io/xorhub/devtools:2.0.1
  protocols: [vnc]
  architectures: [amd64]
  enabled: true
  # Restriction globale par groupe IdP (OIDC) : même une policy listant
  # cette image ne la donne pas à un utilisateur hors du groupe.
  allowedGroups: ["nymphe:dev"]
  resources:
    default: { cpu: "1",  memory: 2Gi }
    min:     { cpu: 500m, memory: 1Gi }
    max:     { cpu: "4",  memory: 8Gi }
---
# Images Kasm officielles (docker.io/kasmweb) — accès KasmVNC natif,
# proxifié par wwt. Référencées par tag de release fixe (1.19.0),
# comme les autres entrées et comme catalog-kasmweb.yaml : le tag
# suffit, l'obligation de digest a été abandonnée (elle refusait tout
# le catalogue synchronisé, publié en tags). Renovate bump le tag ; le
# template DOIT porter la même chaîne (match verbatim). Un digest
# @sha256 reste possible par entrée si l'immutabilité prime.
#
# Alternative « registry » : une seule entrée peut approuver tout un
# préfixe au lieu d'une image exacte — utile pour ouvrir kasmweb/* en
# bloc, au prix d'architectures/ressources communes à toutes les images
# matchées (kasmweb mélange amd64-only et multi-arch : préférer les
# entrées exactes quand le placement compte) :
#
#   spec:
#     registry: docker.io/kasmweb
#     tagPolicy: tag           # tag (défaut) | digest | any (:latest)
#     protocols: [kasmvnc]
apiVersion: waas.xorhub.io/v1alpha1
kind: WorkspaceImage
metadata:
  name: kasm-terminal
spec:
  displayName: "Kasm Terminal"
  description: "Terminal web (image officielle kasmweb, KasmVNC natif)."
  image: docker.io/kasmweb/terminal:1.19.0
  protocols: [kasmvnc]
  architectures: [amd64, arm64]
  enabled: true
  resources:
    default: { cpu: 500m, memory: 1Gi }
    min:     { cpu: 250m, memory: 512Mi }
    max:     { cpu: "2",  memory: 3Gi }
---
apiVersion: waas.xorhub.io/v1alpha1
kind: WorkspaceImage
metadata:
  name: kasm-firefox
spec:
  displayName: "Kasm Firefox"
  description: "Firefox (image officielle kasmweb, KasmVNC natif)."
  image: docker.io/kasmweb/firefox:1.19.0
  protocols: [kasmvnc]
  architectures: [amd64, arm64]
  enabled: true
  resources:
    default: { cpu: "1",  memory: 2Gi }
    min:     { cpu: 500m, memory: 1Gi }
    max:     { cpu: "2",  memory: 4Gi }
