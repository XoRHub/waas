# Policies. Résolution (décision validée) : parmi les policies dont un
# subject matche l'utilisateur, la PLUS HAUTE priority s'applique EN
# BLOC — aucun merge de champs. Convention de priorités :
#   0        default (fallback, subjects vide = tout le monde)
#   100-999  policies de groupe
#   1000+    exceptions nominatives (kind: User)
# Sans policy applicable, la création est REFUSÉE (fail-closed) : ne
# supprimez jamais `default` sans remplacement.
apiVersion: waas.xorhub.io/v1alpha1
kind: WorkspacePolicy
metadata:
  name: default
spec:
  priority: 0
  # subjects vide = tout utilisateur authentifié.
  # NOTE : chaque image du catalogue destinée à "tout le monde" doit être
  # listée ici — une image absente rend ses templates INVISIBLES à la
  # création (c'est ainsi que les templates SSH ont disparu du portail
  # quand dev-ssh manquait à cette liste).
  images: [ubuntu-firefox, ubuntu-xfce, dev-ssh]
  limits:
    maxWorkspaces: 1
    perWorkspace: { cpu: "2", memory: 4Gi, home: 10Gi }
    aggregate:    { cpu: "2", memory: 4Gi, storage: 10Gi }
    # Dimensionnement proposé par le portail (les defaults de l'image
    # priment) ; purement indicatif, aucun effet sur l'enforcement.
    defaults:     { cpu: 500m, memory: 1Gi }
  lifecycle:
    idleSuspendAfter: 2h    # pause douce : compute libéré, home conservé
    maxLifetime: 336h       # 14 j : suppression, home compris
  # Presse-papiers, par direction (absent = tout autorisé). Appliqué par
  # le proxy wwt (droits embarqués dans le connection token), l'IHM ne
  # fait que le refléter. Ex. : couper l'exfiltration pour le fallback :
  # clipboard:
  #   copyFromWorkspace: false   # workspace → poste local
  #   pasteToWorkspace: true     # poste local → workspace
---
apiVersion: waas.xorhub.io/v1alpha1
kind: WorkspacePolicy
metadata:
  name: power-user
spec:
  priority: 100
  subjects:
    # Groupes Authentik, tels qu'émis dans le claim OIDC "groups" et
    # recopiés dans users.user_groups par l'admin (puis par le login
    # OIDC quand il sera branché).
    - kind: Group
      name: "nymphe:dev"
    - kind: Group
      name: "nymphe:ops"
  images: []               # vide = tout le catalogue (allowedGroups s'applique toujours)
  limits:
    maxWorkspaces: 5
    perWorkspace: { cpu: "4", memory: 8Gi, home: 20Gi }
    aggregate:    { cpu: "8", memory: 16Gi, storage: 60Gi }
  lifecycle:
    idleSuspendAfter: 8h
    # pas de maxLifetime : les postes de dev vivent tant qu'ils servent
  # Remote Workspaces (machines hors cluster via guacd) : opt-in explicite
  # par policy — absent/false = fonctionnalité invisible et refusée.
  remoteWorkspaces: true
  # Mode avancé à l'instanciation : les devs peuvent dévier des templates
  # sur ces champs UNIQUEMENT (intersection avec l'allow-list du template ;
  # bloc absent = seule l'allow-list du template s'applique).
  # schedule = crons propres au workspace ; placement = un autre
  # namespace POSSÉDÉ (l'ownership reste vérifiée par le webhook) ;
  # metadata = labels/annotations custom (denylist serveur).
  overrides:
    allowedFields: [env, resources, protocol, protocolParams, schedule, placement, metadata]
