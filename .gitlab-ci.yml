# Monorepo pipeline. waas-images/ has its own child pipeline (image
# builds); this one guards the platform: unit tests always, and the
# per-protocol connection smoke (docs/smoke-connections.md) as the
# delivery gate — an iteration that breaks session establishment must
# fail HERE, not at a user's desk.

stages: [test, validate]

go-tests:
  stage: test
  image: golang:1.25
  script:
    - go work sync
    - go test ./operator/... ./api-server/... ./wwt/... ./shared/...

frontend-tests:
  stage: test
  image: node:22
  script:
    - cd frontend
    - npm ci
    - npm run build
    - npm test -- --run

# Ephemeral k3d cluster + full deploy + real guacd session per protocol.
# Needs a runner with docker (dind) and enough RAM for three desktops;
# runs on the default branch and on demand from MRs.
smoke-connections:
  stage: validate
  image: docker:27
  services: [docker:27-dind]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
      allow_failure: false
  before_script:
    - apk add --no-cache bash curl git go helm kubectl make openssh-keygen
    - curl -sL https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash
  script:
    - make dev-up dev-build dev-load dev-deploy dev-load-images
    - kubectl -n waas rollout status deploy/waas-api-server --timeout=300s
    - make smoke
  after_script:
    - make dev-down || true
